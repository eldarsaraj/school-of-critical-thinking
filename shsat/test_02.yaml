  # ================================================================
  # PART 1 — REVISING / EDITING (Questions 1–20)
  # ================================================================

  - number: 1
    type: multiple_choice
    topic: Revising/Editing
    difficulty: easy
    question: |
      Read the sentence below and choose the best revision.

      "The team of scientists were unable to agree on the next experiment."
    choices:
      A: "The team of scientists was unable to agree on the next experiment."
      B: "The team of scientists were unable to agree about the next experiment."
      C: "The team of scientist were unable to agree on the next experiment."
      D: "The teams of scientists were unable to agree on the next experiment."
    answer: A
    explanation: "The subject is 'team' (singular collective noun), so it requires the singular verb 'was.' The prepositional phrase 'of scientists' does not change the number of the subject."

  - number: 2
    type: multiple_choice
    topic: Revising/Editing
    difficulty: easy
    question: |
      Which revision best corrects the underlined portion?

      "Neither the students nor the teacher are prepared for the fire drill."
    choices:
      A: "is prepared for the fire drill."
      B: "were prepared for the fire drill."
      C: "are preparing for the fire drill."
      D: "No revision needed."
    answer: A
    explanation: "With 'neither...nor,' the verb agrees with the nearest subject. 'Teacher' is singular, so the verb should be 'is.' Choice A correctly makes this change."

  - number: 3
    type: multiple_choice
    topic: Revising/Editing
    difficulty: easy
    question: |
      Select the best way to combine the following two sentences into one.

      "The museum opened a new exhibit last week. Thousands of visitors came on the first day."
    choices:
      A: "The museum opened a new exhibit last week, but thousands of visitors came on the first day."
      B: "When the museum opened a new exhibit last week, thousands of visitors came on the first day."
      C: "The museum opened a new exhibit last week, so thousands of visitors came on the first day."
      D: "The museum opened a new exhibit last week, thousands of visitors came on the first day."
    answer: B
    explanation: "'When' correctly shows that the opening triggered the visitors. Choice C implies a causal link but is weaker. Choice D creates a comma splice. Choice A uses 'but,' which implies contrast where there is none."

  - number: 4
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Which of the following is a run-on sentence?
    choices:
      A: "The library was quiet, and everyone studied in silence."
      B: "After the game ended, the players celebrated on the field."
      C: "She locked the door she forgot to close the windows."
      D: "Running late, he grabbed his bag and dashed out."
    answer: C
    explanation: "Choice C joins two independent clauses ('She locked the door' and 'she forgot to close the windows') without punctuation or a conjunction — a run-on sentence."

  - number: 5
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Which revision best improves the parallelism of the underlined phrase?

      "The coach asked the players to stretch, running laps, and practice drills."
    choices:
      A: "to stretch, to run laps, and to practice drills"
      B: "stretching, running laps, and to practice drills"
      C: "to stretch, running laps, and practicing drills"
      D: "stretch, ran laps, and practiced drills"
    answer: A
    explanation: "For parallel structure, all items in a list must use the same grammatical form. Because the sentence uses 'to stretch,' each item should follow the infinitive pattern: 'to stretch, to run laps, and to practice drills.'"

  - number: 6
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Identify the sentence with a misplaced modifier.
    choices:
      A: "The artist carefully painted the mural during the afternoon."
      B: "Covered in mud, the children ran into the house."
      C: "Flying over the city, the buildings looked tiny from the airplane."
      D: "After eating dinner, the family played board games."
    answer: C
    explanation: "The participial phrase 'Flying over the city' modifies 'the buildings,' making it sound as though the buildings were flying. The intended subject — the person in the airplane — is missing from the main clause."

  - number: 7
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Choose the transition word or phrase that best fills the blank.

      "The new park includes a playground and walking trails. _______, it features a community garden where residents can grow vegetables."
    choices:
      A: "However"
      B: "In addition"
      C: "On the other hand"
      D: "As a result"
    answer: B
    explanation: "'In addition' signals that the sentence is adding another feature to the list. 'However' and 'on the other hand' imply contrast, and 'as a result' implies a consequence."

  - number: 8
    type: multiple_choice
    topic: Revising/Editing
    difficulty: easy
    question: |
      Which of the following is a sentence fragment?
    choices:
      A: "The concert began at seven o'clock sharp."
      B: "Because the road was closed due to construction and heavy equipment."
      C: "Several students volunteered to clean the park."
      D: "He finished the race in under four minutes."
    answer: B
    explanation: "Choice B begins with the subordinating conjunction 'because' and has no independent clause to complete the thought. It cannot stand alone as a sentence."

  - number: 9
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Which word best replaces the underlined word to make the sentence more precise?

      "The firefighters went into the burning building to save the trapped residents."
    choices:
      A: "walked"
      B: "rushed"
      C: "moved"
      D: "traveled"
    answer: B
    explanation: "'Rushed' conveys urgency and speed, which fits the emergency context of a burning building. 'Went' is vague, 'walked' implies a casual pace, and 'traveled' suggests a longer journey."

  - number: 10
    type: multiple_choice
    topic: Revising/Editing
    difficulty: easy
    question: |
      Choose the option that correctly uses a semicolon.
    choices:
      A: "I need to buy eggs; milk, and bread at the store."
      B: "She studied all night; however, she still felt unprepared."
      C: "The park was beautiful; and the flowers were blooming."
      D: "He ran fast; because he was late for class."
    answer: B
    explanation: "A semicolon correctly joins two independent clauses when followed by a conjunctive adverb ('however'). Choice A uses a semicolon in a list incorrectly. Choices C and D place a semicolon before a conjunction or subordinating conjunction."

  - number: 11
    type: multiple_choice
    topic: Revising/Editing
    difficulty: easy
    question: |
      Which revision eliminates the redundancy in the sentence below?

      "The two twins both share an identical resemblance to each other."
    choices:
      A: "The twins resemble each other."
      B: "The two twins both look identical to each other."
      C: "The twins share an identical and similar resemblance."
      D: "Both of the two twins are identical in resemblance to each other."
    answer: A
    explanation: "'Twins' already implies two people, 'both' is redundant with 'twins,' and 'identical resemblance' is redundant with 'share.' Choice A captures the meaning concisely."

  - number: 12
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Which sentence is the clearest and most concise?
    choices:
      A: "At this point in time, we are currently in the process of reviewing the applications."
      B: "We are reviewing the applications."
      C: "At this current moment, all of the applications are being reviewed by us."
      D: "The applications, at this time, are in the midst of being reviewed."
    answer: B
    explanation: "Choice B conveys the same information as all other options in the fewest words, with no padding or passive voice. 'At this point in time' and 'currently in the process of' are wordy fillers."

  - number: 13
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Which revision corrects the inconsistent verb tense in the sentence below?

      "The hikers crossed the river, climbed the ridge, and are setting up camp before dark."
    choices:
      A: "The hikers crossed the river, climbed the ridge, and set up camp before dark."
      B: "The hikers cross the river, climbed the ridge, and are setting up camp before dark."
      C: "The hikers are crossing the river, climbed the ridge, and set up camp."
      D: "The hikers crossed the river, are climbing the ridge, and set up camp before dark."
    answer: A
    explanation: "The first two verbs ('crossed,' 'climbed') are in the simple past tense. The third verb should match: 'set up.' Choice A maintains consistent past tense throughout."

  - number: 14
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Read the following paragraph and choose the sentence that does NOT belong.

      (1) Solar panels convert sunlight into electricity using photovoltaic cells. (2) The technology has become significantly cheaper over the past decade. (3) Wind turbines are often placed on hilltops where winds are strongest. (4) Many homeowners now install solar panels to reduce their energy bills.
    choices:
      A: "Sentence 1"
      B: "Sentence 2"
      C: "Sentence 3"
      D: "Sentence 4"
    answer: C
    explanation: "Sentence 3 introduces wind turbines, which is a different topic from the paragraph's focus on solar panels and their growing adoption."

  - number: 15
    type: multiple_choice
    topic: Revising/Editing
    difficulty: hard
    question: |
      Which revision best corrects the dangling modifier in the sentence below?

      "After reviewing the evidence, the verdict was delivered by the jury."
    choices:
      A: "After reviewing the evidence, the jury delivered the verdict."
      B: "The verdict was delivered after reviewing the evidence by the jury."
      C: "Reviewing the evidence, the verdict was delivered by the jury after."
      D: "The jury's verdict, after reviewing, was delivered on the evidence."
    answer: A
    explanation: "The participial phrase 'After reviewing the evidence' must modify the subject doing the reviewing — the jury. Only Choice A places 'the jury' as the subject immediately after the phrase."

  - number: 16
    type: multiple_choice
    topic: Revising/Editing
    difficulty: hard
    question: |
      Choose the sentence that best combines the three sentences below into one clear, concise sentence.

      "The bridge was built in 1903. It has survived two major earthquakes. Engineers say it is still structurally sound."
    choices:
      A: "The bridge was built in 1903, and it survived two major earthquakes, and engineers say it is still structurally sound."
      B: "Built in 1903, the bridge has survived two major earthquakes and remains structurally sound according to engineers."
      C: "Engineers say the bridge, which was built in 1903, has survived earthquakes, two major ones, and is still sound."
      D: "The 1903 bridge survived two earthquakes, and the engineers have said it is sound structurally."
    answer: B
    explanation: "Choice B uses a past-participial opener to compress the first sentence, combines the second and third with 'and remains,' and flows naturally. The other options are wordy or awkward."

  - number: 17
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Which sentence uses the correct pronoun case?
    choices:
      A: "Me and my sister went to the park after school."
      B: "The teacher gave the awards to Marcus and I."
      C: "Whoever finishes first may leave the room."
      D: "Us students should organise a fundraiser."
    answer: C
    explanation: "'Whoever' is correct as the subject of the clause 'whoever finishes first.' Choice A should be 'My sister and I,' Choice B should be 'Marcus and me' (objective case after 'to'), and Choice D should be 'We students.'"

  - number: 18
    type: multiple_choice
    topic: Revising/Editing
    difficulty: hard
    question: |
      Which revision best improves the following sentence by making it more specific and vivid?

      "The weather was really bad during our trip."
    choices:
      A: "The weather was extremely bad during our trip to the coast."
      B: "We experienced bad weather that was not good during the trip."
      C: "Freezing rain hammered the windshield for three straight hours as we drove along the coast."
      D: "The weather during our trip was the worst weather we had ever seen."
    answer: C
    explanation: "Choice C replaces vague words ('really bad') with concrete, sensory details ('freezing rain hammered the windshield,' 'three straight hours,' 'drove along the coast'), creating a vivid image."

  - number: 19
    type: multiple_choice
    topic: Revising/Editing
    difficulty: hard
    question: |
      Read the paragraph below and choose the best sentence to add at the beginning to serve as a topic sentence.

      "_______ A single colony can contain up to 60,000 bees, each with a specific role. Worker bees collect nectar and pollen, nurse bees care for the young, and the queen's sole purpose is to reproduce. This division of labour allows the hive to function as a single, efficient organism."
    choices:
      A: "Honey is used in many recipes around the world."
      B: "Bees are one of nature's most organised societies."
      C: "Scientists have studied insects for hundreds of years."
      D: "Some people are allergic to bee stings and must carry medication."
    answer: B
    explanation: "The paragraph describes the organisational structure of a bee colony — roles, division of labour, and efficiency. Choice B introduces this theme directly."

  - number: 20
    type: multiple_choice
    topic: Revising/Editing
    difficulty: hard
    question: |
      Which transition best fills the blank to show a cause-and-effect relationship?

      "The factory released toxic chemicals into the river for years. _______, fish populations downstream declined by nearly 80%."
    choices:
      A: "Meanwhile"
      B: "In contrast"
      C: "Consequently"
      D: "For instance"
    answer: C
    explanation: "'Consequently' signals that what follows is a direct result of what came before. 'Meanwhile' indicates simultaneous events, 'in contrast' signals opposition, and 'for instance' introduces an example."

  # ================================================================
  # PART 2 — READING COMPREHENSION
  # ================================================================

  # --- PASSAGE 1: Fiction — "The Map Maker's Daughter" (Questions 21–27) ---

  - number: 21
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: medium
    passage_id: passage_2_1
    passage_title: "The Map Maker's Daughter"
    passage_text: |
      Lena's father drew maps for a living. Not the kind produced by satellites and software — his
      were hand-drawn, inked on heavy paper with lines so precise they looked printed. He mapped
      rivers that no longer flowed the way they once did, boundaries that had shifted, towns that
      had changed their names. People came from across the country to buy his work, not because
      the maps were accurate, but because they remembered.

      Lena had grown up watching his hands move across the paper. She knew the smell of the ink,
      the sound of the nib scratching, the way he would hold the page up to the window to check
      the evenness of his lines. She had assumed, without thinking, that she would one day take
      over the shop.

      But at fifteen, Lena could not draw a straight line. She had tried for years. Her rivers
      wobbled. Her borders drifted. Her father said nothing about it, which was worse than
      criticism.

      One evening, a customer returned a map her father had made of a village in the mountains.
      "The church is on the wrong side of the square," the man said flatly. Her father examined
      the map, then looked up.

      "The church was moved in 1987," he said. "I drew it where it stood."

      The man left without buying anything. After he was gone, Lena asked, "Why didn't you just
      fix it?"

      Her father set the map down carefully. "Because a map that only shows what is there now
      tells you nothing about where you have been."

      That night, Lena picked up a pen. She did not try to draw a straight line. Instead, she
      drew her street as she remembered it from when she was five — the crooked fence, the tree
      that had since been cut down, the pothole her mother used to swerve around. The lines
      were uneven, but the map was true.
    question: |
      What does the phrase "not because the maps were accurate, but because they remembered" (paragraph 1) suggest about the father's maps?
    choices:
      A: "The maps contain factual errors that reduce their usefulness."
      B: "The maps capture historical details that standard maps no longer show."
      C: "The maps are popular because they are less expensive than digital ones."
      D: "The customers buy the maps as decorative art, not for navigation."
    answer: B
    explanation: "The phrase indicates that the value of the father's maps lies in preserving what places once looked like — historical memory — rather than reflecting current geography."

  - number: 22
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: medium
    passage_id: passage_2_1
    question: |
      What is Lena's main struggle in the story?
    choices:
      A: "She cannot afford to buy the supplies needed to make maps."
      B: "She lacks the precise drawing skill her father possesses."
      C: "She disagrees with her father's philosophy about map-making."
      D: "She wants to use digital tools, but her father forbids it."
    answer: B
    explanation: "The story explicitly states that 'Lena could not draw a straight line' and that her rivers 'wobbled' and borders 'drifted.' Her struggle is a lack of technical precision."

  - number: 23
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: hard
    passage_id: passage_2_1
    question: |
      What does the father mean when he says, "A map that only shows what is there now tells you nothing about where you have been"?
    choices:
      A: "Maps should never be updated because old versions are always better."
      B: "Recording only the present erases the history and meaning of a place."
      C: "Customers prefer to buy maps that are inaccurate."
      D: "The father is confused about modern geography."
    answer: B
    explanation: "The father's statement reflects his belief that maps should preserve the past. A purely current map would lose the layers of history — the moved church, the old boundaries — that give a place its story."

  - number: 24
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: medium
    passage_id: passage_2_1
    question: |
      Why does the father's silence about Lena's drawing trouble her more than criticism would?
    choices:
      A: "She interprets his silence as a sign that he has given up on her."
      B: "She wants him to yell at her so she can argue back."
      C: "She believes he is secretly selling her drawings without telling her."
      D: "His silence means he has not noticed her attempts."
    answer: A
    explanation: "Criticism would at least suggest her father believes she can improve. Silence implies he sees no path forward for her — or that the gap is too wide to address — which feels like abandonment of hope."

  - number: 25
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: medium
    passage_id: passage_2_1
    question: |
      How does Lena's final drawing differ from her earlier attempts?
    choices:
      A: "She uses a ruler and produces perfectly straight lines."
      B: "She draws from memory rather than trying to replicate her father's precision."
      C: "She traces one of her father's maps and adds her own details."
      D: "She draws a map of a place she has never visited."
    answer: B
    explanation: "Instead of trying to draw precise geographic lines, Lena draws her street as she remembers it — the crooked fence, the missing tree, the pothole. She embraces imperfection and personal memory."

  - number: 26
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: hard
    passage_id: passage_2_1
    question: |
      Which best describes the theme of this story?
    choices:
      A: "Children should always follow exactly in their parents' footsteps."
      B: "Technical skill is the only measure of artistic talent."
      C: "Finding your own voice in a craft may mean redefining what that craft can be."
      D: "Maps are more valuable than digital technology."
    answer: C
    explanation: "Lena cannot replicate her father's precise style, but she discovers she can carry forward his philosophy — preserving memory — in her own imperfect way. She redefines what map-making means for her."

  - number: 27
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: medium
    passage_id: passage_2_1
    question: |
      The sentence "The lines were uneven, but the map was true" most likely means:
    choices:
      A: "The map was factually accurate and could be used for navigation."
      B: "Lena's drawing was technically flawed but emotionally and historically honest."
      C: "The pen Lena used produced uneven ink but the map was still readable."
      D: "Lena had finally learned to draw perfectly straight lines."
    answer: B
    explanation: "The contrast between 'uneven' and 'true' signals that truth, in this story, is not about geometric precision but about faithfully representing lived experience and memory."

  # --- PASSAGE 2: Nonfiction/Science — "The Hidden Power of Soil" (Questions 28–34) ---

  - number: 28
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: medium
    passage_id: passage_2_2
    passage_title: "The Hidden Power of Soil"
    passage_text: |
      Beneath every forest, field, and garden lies a world more complex than most people imagine.
      A single teaspoon of healthy soil contains more microorganisms than there are people on
      Earth — roughly 8 billion bacteria, fungi, protozoa, and other microscopic life forms. These
      organisms are not merely inhabitants of the soil; they are its architects.

      The most important relationship in soil is the partnership between plant roots and fungi
      known as mycorrhizal networks. The fungi extend thread-like filaments called hyphae deep
      into the soil, reaching water and nutrients that roots alone could never access. In return,
      the plant provides the fungi with sugars produced through photosynthesis. This exchange is
      so efficient that approximately 90% of all land plants depend on mycorrhizal partnerships
      to survive.

      What scientists have discovered more recently is that these fungal networks do not serve
      just one plant. The hyphae connect multiple trees and plants underground, forming what
      researchers have called the "Wood Wide Web." Through this network, a mature tree can
      transfer carbon and nutrients to a struggling seedling nearby. Some scientists believe
      that older trees preferentially support their own offspring, though this remains debated.

      The implications for agriculture are significant. Industrial farming practices — tilling,
      monoculture, and heavy use of chemical fertilisers — destroy mycorrhizal networks. When
      these networks collapse, plants become entirely dependent on artificial inputs to grow.
      A growing number of farmers are now adopting regenerative practices that protect soil
      biology: minimal tilling, cover crops, and crop rotation. The goal is not just to grow
      food, but to rebuild the living systems beneath it.
    question: |
      According to the passage, approximately how many microorganisms are found in a single teaspoon of healthy soil?
    choices:
      A: "8 million"
      B: "8 billion"
      C: "80 billion"
      D: "8 trillion"
    answer: B
    explanation: "The passage states 'roughly 8 billion bacteria, fungi, protozoa, and other microscopic life forms' in a single teaspoon of healthy soil."

  - number: 29
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: medium
    passage_id: passage_2_2
    question: |
      What do plants provide to mycorrhizal fungi in exchange for water and nutrients?
    choices:
      A: "Carbon dioxide from respiration"
      B: "Sugars produced through photosynthesis"
      C: "Nitrogen absorbed from the atmosphere"
      D: "Minerals extracted from rocks"
    answer: B
    explanation: "The passage states that 'the plant provides the fungi with sugars produced through photosynthesis.' This is the plant's side of the mycorrhizal exchange."

  - number: 30
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: hard
    passage_id: passage_2_2
    question: |
      Why do researchers call the underground fungal network the "Wood Wide Web"?
    choices:
      A: "Because the network was first discovered using internet technology."
      B: "Because the fungal filaments connect multiple plants, similar to how the internet connects computers."
      C: "Because the network only exists in forests with very old trees."
      D: "Because the fungi resemble the structure of a spider's web."
    answer: B
    explanation: "The term is a play on 'World Wide Web.' Just as the internet connects computers, the mycorrhizal hyphae connect multiple trees and plants, enabling resource sharing across a network."

  - number: 31
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: medium
    passage_id: passage_2_2
    question: |
      What is the main purpose of the final paragraph?
    choices:
      A: "To describe the chemical composition of soil."
      B: "To explain why industrial farming practices harm soil biology and what alternatives exist."
      C: "To argue that all chemical fertilisers should be banned immediately."
      D: "To introduce the topic of mycorrhizal networks for the first time."
    answer: B
    explanation: "The final paragraph identifies how industrial farming destroys mycorrhizal networks, then describes regenerative practices that protect soil biology. It connects the science to practical consequences."

  - number: 32
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: hard
    passage_id: passage_2_2
    question: |
      The passage describes mycorrhizal organisms as "architects" of the soil. What does this word choice suggest?
    choices:
      A: "The organisms build physical structures like buildings inside the soil."
      B: "The organisms passively exist in the soil without affecting it."
      C: "The organisms actively shape and construct the soil environment."
      D: "The organisms are intelligent beings that plan their actions."
    answer: C
    explanation: "Calling organisms 'architects' implies they are not passive occupants but active builders and shapers of the soil ecosystem. The word elevates their role from inhabitants to creators."

  - number: 33
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: medium
    passage_id: passage_2_2
    question: |
      As used in the passage, the word "regenerative" (paragraph 4) most nearly means:
    choices:
      A: "Producing higher crop yields than conventional methods."
      B: "Designed to restore and renew natural systems."
      C: "Using advanced technology to monitor soil health."
      D: "Eliminating all human intervention in farming."
    answer: B
    explanation: "In context, 'regenerative practices' are those that 'protect soil biology' and 'rebuild the living systems beneath it.' The word describes restoration and renewal, not just productivity."

  - number: 34
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: hard
    passage_id: passage_2_2
    question: |
      Which statement best expresses the central idea of the entire passage?
    choices:
      A: "Soil is a complex living system whose microscopic networks sustain plant life and are threatened by modern farming."
      B: "Fungi are more important than plants in every ecosystem on Earth."
      C: "Chemical fertilisers are the only effective way to grow food at scale."
      D: "Scientists have recently discovered that soil contains bacteria."
    answer: A
    explanation: "The passage moves from describing soil's microscopic complexity, to explaining mycorrhizal networks and their importance, to showing how farming threatens them. The central idea connects all three threads."

  # --- PASSAGE 3: Poetry — "What the River Knows" (Questions 35–39) ---

  - number: 35
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: medium
    passage_id: passage_2_3
    passage_title: "What the River Knows"
    passage_text: |
      The river does not rush because it is late.
      It does not slow because the day is done.
      It moves at the only pace it has ever known,
      which is the pace of everything beneath the sun.

      It carries what falls in — the leaf, the stone,
      the branch that snapped in last night's storm —
      and does not sort the weight of what it bears
      or ask if what it holds should change its form.

      I stood beside it once when I was young
      and thought it weak because it would not fight
      the rocks that broke its current into foam.
      I know now it was wearing them from sight.

      They say that time is like a river's flow,
      but I think rivers understand it best:
      you do not conquer what you carry — no,
      you simply move, and let the moving rest.
    question: |
      In the first stanza, what does the speaker suggest about the river's movement?
    choices:
      A: "The river is always in a hurry to reach the ocean."
      B: "The river moves at a constant, natural pace unaffected by external pressures."
      C: "The river changes speed depending on the time of day."
      D: "The river has been slowing down over many years."
    answer: B
    explanation: "The speaker emphasises that the river does not 'rush' or 'slow' — it moves 'at the only pace it has ever known.' This suggests a constant, unhurried, natural rhythm."

