  # --- PASSAGE 4: Nonfiction/History — "The Forgotten Engineers" (Questions 40–47) ---

  - number: 40
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: medium
    passage_id: passage_2_4
    passage_title: "The Forgotten Engineers"
    passage_text: |
      When people think of the construction of the transcontinental railroad, they often picture
      the golden spike ceremony at Promontory Summit, Utah, on May 10, 1869 — the moment the
      Central Pacific and Union Pacific lines were joined. Photographs from that day show rows
      of well-dressed officials and executives shaking hands. What the photographs do not show
      are the roughly 12,000 Chinese labourers who built the most dangerous section of the
      railroad.

      The Central Pacific Railroad hired Chinese workers beginning in 1865, initially out of
      desperation. White labourers refused the most hazardous assignments or demanded higher
      wages. The Chinese workers, many of whom had immigrated during the California Gold Rush,
      accepted lower pay — roughly $26 to $35 per month — and were not provided food or shelter,
      unlike their white counterparts who received both in addition to wages.

      The work was extraordinarily dangerous. Chinese labourers were lowered in woven baskets
      over the sides of cliffs to drill holes and place explosives in the granite walls of the
      Sierra Nevada mountains. Many died in avalanches, rockslides, and premature explosions.
      Exact death tolls were never recorded; historians estimate between 1,000 and 1,500
      Chinese workers perished during the construction.

      Despite this, Chinese workers set records that astonished their employers. They laid ten
      miles of track in a single day during the final push — a feat that has never been
      equalled in manual railroad construction. Charles Crocker, one of the Central Pacific's
      founders, later admitted that without the Chinese labourers, the railroad could not have
      been completed.

      Yet when the golden spike was driven, not a single Chinese worker was invited to the
      ceremony. It was not until 2014 — 145 years later — that the U.S. Department of Labor
      inducted Chinese railroad workers into its Hall of Honor, acknowledging their contribution
      for the first time at a federal level.
    question: |
      According to the passage, why did the Central Pacific Railroad first begin hiring Chinese workers?
    choices:
      A: "Chinese workers had special training in railroad construction."
      B: "White labourers refused dangerous tasks or demanded higher pay."
      C: "The U.S. government required companies to hire immigrant workers."
      D: "Chinese workers volunteered to work without any compensation."
    answer: B
    explanation: "The passage states the company hired Chinese workers 'initially out of desperation' because 'white labourers refused the most hazardous assignments or demanded higher wages.'"

