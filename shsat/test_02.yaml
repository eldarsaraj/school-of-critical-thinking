  # --- PASSAGE 5: Fiction — "The Weight of Glass" (Questions 48–57) ---

  - number: 48
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: medium
    passage_id: passage_2_5
    passage_title: "The Weight of Glass"
    passage_text: |
      Jonas had been staring at the glass jar on the top shelf for as long as he could remember.
      It was not beautiful — cloudy, with a crack running along the rim like a scar — but his
      mother treated it as if it were made of something more precious than glass. She dusted it
      every Sunday morning. She never moved it to a lower shelf. She never spoke about it.

      When Jonas was ten, he asked about the jar. His mother paused mid-sweep and said, "It
      belonged to your grandmother." That was all. Jonas learned early that some sentences were
      doors that had been closed on purpose.

      At twelve, Jonas's best friend Tomás came over and spotted the jar. "What's inside?" he
      asked. Jonas shrugged. He had never looked. The jar had always been something you left
      alone, like the corner of the attic where the roof leaked or the photograph on the hallway
      wall that made his mother go quiet.

      It was not until Jonas turned fourteen and his mother was admitted to the hospital that he
      finally reached for the jar. Standing on a chair, he lifted it down. It was heavier than
      he expected. Inside, folded tight, were dozens of small pieces of paper. Each one bore a
      single sentence in handwriting he did not recognise.

      "Today we planted tomatoes, and Marta laughed so hard the neighbours complained."
      "Marta's first word was 'bird,' and she pointed at a cloud."
      "I am afraid I will forget her voice."

      Marta was his mother's name. The handwriting belonged to his grandmother. The jar held
      the small, ordinary moments of his mother's childhood — captured one sentence at a time
      by a woman who must have known that memory fades.

      Jonas sat on the kitchen floor, reading every slip. When he was done, he folded them back
      exactly as he had found them and returned the jar to the top shelf. Then he found a pen
      and a scrap of paper and wrote: "Mam went to the hospital today, and I read Grandmother's
      jar." He folded the paper, opened the jar, and placed it on top.
    question: |
      Why does Jonas's mother treat the jar with such care?
    choices:
      A: "The jar is financially valuable and could be sold for a large sum."
      B: "The jar contains memories of her childhood preserved by her own mother."
      C: "The jar is fragile and she is afraid it will break if moved."
      D: "The jar was given to her by Jonas's father before he left."
    answer: B
    explanation: "The story reveals that the jar holds slips of paper written by Jonas's grandmother, documenting moments from his mother's (Marta's) childhood. The mother treats it with care because it holds irreplaceable personal memories."

  - number: 49
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: hard
    passage_id: passage_2_5
    question: |
      What does the sentence "Jonas learned early that some sentences were doors that had been closed on purpose" mean?
    choices:
      A: "Jonas's mother frequently locked the doors in their house."
      B: "Jonas understood that certain topics were deliberately off-limits for discussion."
      C: "Jonas's mother did not speak English well and often gave short answers."
      D: "Jonas was not allowed to open doors in the house without permission."
    answer: B
    explanation: "The metaphor compares short, deflecting answers to closed doors — signals that the topic is not open for further conversation. Jonas recognised that his mother's brief reply was intentional, not incomplete."

  - number: 50
    type: multiple_choice
    topic: Reading Comprehension
