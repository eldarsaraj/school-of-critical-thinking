  # === Integers & Number Properties (Q1–8) ===

  - number: 1
    type: multiple_choice
    topic: Number Properties
    difficulty: easy
    question: |
      What is the value of (−3) × (−4) × (−2)?
    choices:
      A: "24"
      B: "−24"
      C: "12"
      D: "−12"
    answer: B
    explanation: "(−3) × (−4) = 12. Then 12 × (−2) = −24. Three negative factors give a negative product."

  - number: 2
    type: multiple_choice
    topic: Number Properties
    difficulty: easy
    question: |
      Which of the following numbers is divisible by both 3 and 4?
    choices:
      A: "18"
      B: "28"
      C: "36"
      D: "45"
    answer: C
    explanation: "36 ÷ 3 = 12 ✓ and 36 ÷ 4 = 9 ✓. 18 is divisible by 3 but not 4. 28 is divisible by 4 but not 3. 45 is divisible by 3 but not 4."

  - number: 3
    type: multiple_choice
    topic: Number Properties
    difficulty: easy
    question: |
      What is the greatest common factor (GCF) of 48 and 36?
    choices:
      A: "6"
      B: "8"
      C: "12"
      D: "24"
    answer: C
    explanation: "Factors of 48: 1, 2, 3, 4, 6, 8, 12, 16, 24, 48. Factors of 36: 1, 2, 3, 4, 6, 9, 12, 18, 36. The greatest common factor is 12."

  - number: 4
    type: multiple_choice
    topic: Number Properties
    difficulty: medium
    question: |
      What is the least common multiple (LCM) of 8 and 14?
    choices:
      A: "28"
      B: "56"
      C: "112"
      D: "48"
    answer: B
    explanation: "8 = 2³ and 14 = 2 × 7. LCM = 2³ × 7 = 56."

  - number: 5
    type: multiple_choice
    topic: Number Properties
    difficulty: medium
    question: |
      Which expression is equivalent to 2⁵ × 2³?
    choices:
      A: "2¹⁵"
      B: "2⁸"
      C: "4⁸"
      D: "2²"
    answer: B
    explanation: "When multiplying powers with the same base, add the exponents: 2⁵ × 2³ = 2⁽⁵⁺³⁾ = 2⁸."

  - number: 6
    type: multiple_choice
    topic: Number Properties
    difficulty: medium
    question: |
      What is the value of |−7| + |3| − |−2|?
    choices:
      A: "8"
      B: "12"
      C: "6"
      D: "−6"
    answer: A
    explanation: "|−7| = 7, |3| = 3, |−2| = 2. So 7 + 3 − 2 = 8."

  - number: 7
    type: multiple_choice
    topic: Number Properties
    difficulty: easy
    question: |
      Which list shows the numbers in order from least to greatest?

      −5, 2, −3, 0, 4
    choices:
      A: "−5, −3, 0, 2, 4"
      B: "−3, −5, 0, 2, 4"
      C: "0, 2, −3, −5, 4"
      D: "4, 2, 0, −3, −5"
    answer: A
    explanation: "On the number line, −5 is farthest left, then −3, then 0, then 2, then 4. Choice A lists them from least to greatest."

  - number: 8
    type: multiple_choice
    topic: Number Properties
    difficulty: medium
    question: |
      If n is an odd integer, which of the following must also be odd?
    choices:
      A: "n + 1"
      B: "2n"
      C: "n²"
      D: "n + 3"
    answer: C
    explanation: "An odd number squared is always odd (odd × odd = odd). n + 1 is even, 2n is always even, and n + 3 is even (odd + odd = even)."

  # === Fractions & Decimals (Q9–14) ===

  - number: 9
    type: multiple_choice
    topic: Fractions and Decimals
    difficulty: easy
    question: |
      What is ³⁄₄ + ²⁄₃?
    choices:
      A: "⁵⁄₇"
      B: "¹⁷⁄₁₂"
      C: "¹⁄₁₂"
      D: "⁶⁄₇"
    answer: B
    explanation: "Common denominator is 12. ³⁄₄ = ⁹⁄₁₂ and ²⁄₃ = ⁸⁄₁₂. Sum = ⁹⁄₁₂ + ⁸⁄₁₂ = ¹⁷⁄₁₂."

  - number: 10
    type: multiple_choice
    topic: Fractions and Decimals
    difficulty: medium
    question: |
      What is ⁵⁄₆ ÷ ²⁄₃?
    choices:
      A: "⁵⁄₉"
      B: "¹⁰⁄₁₈"
      C: "⁵⁄₄"
      D: "¹⁵⁄₁₂"
    answer: C
    explanation: "Dividing by a fraction means multiplying by its reciprocal: ⁵⁄₆ × ³⁄₂ = ¹⁵⁄₁₂ = ⁵⁄₄."

  - number: 11
    type: multiple_choice
    topic: Fractions and Decimals
    difficulty: medium
    question: |
      Which fraction is equivalent to 0.375?
    choices:
      A: "¹⁄₃"
      B: "³⁄₈"
      C: "⁵⁄₁₂"
      D: "⁷⁄₂₀"
    answer: B
    explanation: "0.375 = 375/1000 = 3/8."

  - number: 12
    type: multiple_choice
    topic: Fractions and Decimals
    difficulty: medium
    question: |
      What is 2¹⁄₃ × 1¹⁄₂?
    choices:
      A: "2¹⁄₆"
      B: "3¹⁄₂"
      C: "3¹⁄₆"
      D: "4"
    answer: B
    explanation: "Convert to improper fractions: 2¹⁄₃ = ⁷⁄₃ and 1¹⁄₂ = ³⁄₂. Multiply: ⁷⁄₃ × ³⁄₂ = ²¹⁄₆ = ⁷⁄₂ = 3¹⁄₂."

  - number: 13
    type: multiple_choice
    topic: Fractions and Decimals
    difficulty: easy
    question: |
      Which decimal is equal to ⁷⁄₂₀?
    choices:
      A: "0.35"
      B: "0.7"
      C: "3.5"
      D: "0.37"
    answer: A
    explanation: "⁷⁄₂₀ = 7 ÷ 20 = 0.35."

  - number: 14
    type: multiple_choice
    topic: Fractions and Decimals
    difficulty: hard
    question: |
      If ²⁄₅ of a number is 18, what is ³⁄₄ of the same number?
    choices:
      A: "27"
      B: "30"
      C: "33.75"
      D: "45"
    answer: C
    explanation: "²⁄₅ × n = 18, so n = 18 × ⁵⁄₂ = 45. Then ³⁄₄ × 45 = 135/4 = 33.75."

  # === Percents (Q15–19) ===

  - number: 15
    type: multiple_choice
    topic: Percents
    difficulty: easy
    question: |
      What is 15% of 240?
    choices:
      A: "24"
      B: "36"
      C: "48"
      D: "30"
    answer: B
    explanation: "15% × 240 = 0.15 × 240 = 36."

  - number: 16
    type: multiple_choice
    topic: Percents
    difficulty: medium
    question: |
      A jacket originally costs $80. It is on sale for 25% off. What is the sale price?
    choices:
