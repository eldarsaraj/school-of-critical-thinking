      C: "She wrote down her worries about money and health."
      D: "She left instructions for Jonas about how to care for his mother."
    answer: B
    explanation: "The slips capture tiny moments — planting tomatoes, a first word, a fear of forgetting. The sentence 'I am afraid I will forget her voice' reveals the grandmother's motivation: preserving memory against the inevitability of forgetting."

  - number: 53
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: medium
    passage_id: passage_2_5
    question: |
      Why does Jonas fold the papers back "exactly as he had found them"?
