      B: "He is writing a letter to his grandmother to communicate with her spirit."
      C: "He wants to prove to his mother that he opened the jar."
      D: "He is filling the jar with paper because it was nearly empty."
    answer: A
    explanation: "By writing his own sentence and adding it to the jar, Jonas extends the chain his grandmother began. He becomes the next keeper of small moments, continuing the family practice of fighting forgetting."

