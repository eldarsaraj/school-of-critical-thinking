  # --- PASSAGE 6: Nonfiction/Science — "Navigating Without a Map" (Questions 53–57) ---

  - number: 53
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: medium
    passage_id: passage_6
    passage_title: "Navigating Without a Map"
    passage_text: |
      When a monarch butterfly emerges from its chrysalis in September, it has never made a
      journey before. Yet it will fly up to 3,000 miles from its birthplace in the northern
      United States to a cluster of pine and fir forests in the mountains of central Mexico —
      a place it has never seen. The following spring, its offspring will leave those mountains
      and fly north again, laying eggs along the way. Their grandchildren will complete the
      return journey. No single butterfly makes the full round trip.

      Biologists have spent decades trying to understand how the monarch navigates. The butterfly
      uses a time-compensated sun compass — a biological mechanism that tells it both the
      direction of the sun and the time of day. Because the sun's position shifts across the sky,
      the compass must constantly adjust. Researchers have found that this calculation is
      performed in the butterfly's antennae, not its brain.

      What triggers the journey is equally remarkable. Falling temperatures and shortening
      daylight hours in late summer signal the butterfly's body to stop reproducing and begin
      storing fat for migration. These same cues prevent the butterfly from reaching full
      maturity. The autumn generation — the one that migrates — lives eight to nine months,
      while summer generations live only two to six weeks.

      Despite being tiny and fragile, monarchs complete their journey by riding warm thermal
      air currents that can carry them hundreds of miles per day. They have no single leader.
      The vast columns of orange and black that fill the autumn sky are simply individuals
      responding to the same internal signals, moving in the same direction, toward a
      destination none of them has been.
    question: |
      According to the passage, what is remarkable about the monarch butterfly's ability to migrate?
    choices:
      A: "It can fly more than 3,000 miles per hour."
      B: "It navigates a route it has never travelled, using an internal biological compass."
      C: "It is guided by older butterflies who have completed the journey before."
      D: "It survives the journey by feeding on plants found only in Mexico."
    answer: B
    explanation: "The passage states the butterfly has 'never made a journey before' yet navigates to a specific destination using a 'time-compensated sun compass.' There are no older guide butterflies — no single butterfly makes the full round trip."

