    passage_title: "The First Winter"
    passage_text: |
      The snow surprised Amara. Back home, people spoke of it with longing, as though it were
      something sacred — white and clean and soft. Nobody had mentioned the cold that came with
      it, or the way it soaked through the shoes she had brought from Accra, or the grey slush
      that lined the gutters of her new street in Queens.

      Her mother had started working two weeks after they arrived. Her father was still trying
      to get his nursing certificate recognised. At school, Amara was placed in a class where
      nobody pronounced her name correctly and the teacher smiled at her the way adults smile
      at things they do not understand.

      One morning in January, a girl named Priya sat beside her in the cafeteria without asking.
      She put a plastic container of rice on the table between them. "My mom made too much," she
      said, which Amara suspected was not true.

      They ate without talking for a while. Then Priya said: "I've been here three years and I
      still hate winter."

      Amara looked up. "How long until you stop feeling like a mistake?"

      Priya thought about it. "I don't think it's that. I think you start to feel like you belong
      somewhere that doesn't exist yet. Like a place that's still being made."

      Amara looked out at the cafeteria — the noise, the trays, the people who moved through it
      all like they had never needed to learn it. She did not feel like she belonged. But she
      thought she understood what Priya meant. She was not a mistake. She was early.
    question: |
      What does the opening paragraph reveal about Amara's expectations of snow?
    choices:
      A: "She expected snow to be dangerous and had prepared carefully."
      B: "She had heard positive, romanticised descriptions that did not match reality."
      C: "She had never heard of snow before arriving in New York."
      D: "She had experienced snow before and was not surprised by the cold."
    answer: B
    explanation: "The passage says people back home described snow 'as though it were something sacred — white and clean and soft.' Nobody described the cold, the wet shoes, or the grey slush. Amara's experience contradicts the idealised version she had heard."

