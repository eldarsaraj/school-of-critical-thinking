    passage_title: "Building the Bridge"
    passage_text: |
      When the Brooklyn Bridge opened in May 1883, it was the longest suspension bridge in the
      world. Its two stone towers rose higher than any other structure in New York City. To the
      crowds who gathered to watch President Chester Arthur lead the opening procession, it must
      have seemed like a miracle — a slender ribbon of steel spanning a body of water that had
      separated two great cities for more than two centuries.

      The miracle had taken fourteen years and an enormous human cost to achieve. The project's
      chief engineer, John Roebling, was injured in an accident at the start of construction and
      died of tetanus weeks later. His son Washington Roebling took over, but he too was struck
      down — by caisson disease, now called decompression sickness, contracted while inspecting
      underwater foundations in pressurised chambers called caissons. Washington became permanently
      disabled and never again visited the construction site.

      For the next eleven years, the bridge was effectively managed from a window. Washington's
      wife, Emily Warren Roebling, studied engineering, mathematics, and materials science so
      that she could relay her husband's instructions to the construction teams below. She visited
      the site daily, communicating his decisions and solving problems as they arose. When the
      bridge opened, Emily was the first person to cross it — carrying a rooster, a symbol of
      victory, in her arms.

      The bridge required approximately 14,000 miles of wire wound into its cables. Each cable
      contains 5,434 individual wires. Workers called "wire men" crossed the bridge hundreds of
      times each day at dizzying heights, in all weathers. Twenty-seven people died during
      construction. The final cost was $15.5 million — roughly $450 million today.

      What opened in 1883 was not merely a crossing. It was proof that human ingenuity, persistence,
      and cooperation could conquer what geography had made impossible.
    question: |
      Which event happened FIRST in the construction of the Brooklyn Bridge?
    choices:
      A: "Emily Warren Roebling began studying engineering."
      B: "Washington Roebling contracted decompression sickness."
      C: "John Roebling was injured and later died of tetanus."
      D: "The bridge's cables were wound with 14,000 miles of wire."
    answer: C
    explanation: "The passage states John Roebling was injured 'at the start of construction' and died weeks later. Washington then took over before being disabled himself. Emily's role followed after Washington became incapacitated."

