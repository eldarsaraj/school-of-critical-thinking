    passage_title: "More Than Silk"
    passage_text: |
      The term "Silk Road" conjures images of camel caravans crossing vast deserts,
      laden with bolts of glittering fabric. The image is not wrong, but it is
      incomplete. The Silk Road was not one road, and silk was not its only cargo.
      It was a shifting network of overland and maritime routes connecting China in
      the east to the Mediterranean world in the west, threading through Central
      Asia, Persia, and the Arabian Peninsula along the way. At its height, between
      roughly 100 BCE and 1450 CE, it linked more civilisations more continuously
      than any other exchange network in the ancient and medieval world.

      The goods that moved along these routes were extraordinarily diverse. Chinese
      merchants exported silk, porcelain, and tea; they imported glass, gold, and
      silver from the west. Spices — pepper, cinnamon, and nutmeg — travelled from
      South and Southeast Asia into both Chinese and European markets. Cotton and
      indigo moved from India. Horses from Central Asia were so prized in China
      that Chinese rulers traded enormous quantities of silk to obtain them. The
      exchange was never simply a transfer of luxury goods; it was the movement of
      entire material cultures.

      Ideas and beliefs travelled alongside goods. Buddhism spread from India into
      Central Asia and China largely through Silk Road merchants and pilgrims. Islam
      followed trade routes westward from Arabia and eastward into Central Asia. The
      mathematical concept of zero, developed in India, reached the Arab world and
      eventually Europe through these same channels. Paper and printing, Chinese
      inventions, moved westward; astronomical knowledge moved in multiple directions
      at once.

      Disease travelled too. The Black Death — the bubonic plague pandemic that killed
      between one-third and one-half of Europe's population in the fourteenth century —
      is believed to have spread westward along Silk Road routes from Central Asia.
      Trade that connected the world also made the world vulnerable in new ways.

      The Silk Road declined as maritime trade expanded in the fifteenth and sixteenth
      centuries. Portuguese and later Dutch navigators found ocean routes to Asia that
      were faster, cheaper, and capable of carrying larger volumes of goods. The great
      overland network did not disappear overnight; it faded, route by route, as the
      sea became the new highway of global commerce.
    question: |
      According to the passage, which of the following goods did China import from the west?
    choices:
      A: "Silk, porcelain, and spices"
      B: "Glass, gold, and silver"
      C: "Cotton, indigo, and horses"
      D: "Paper, pepper, and nutmeg"
    answer: B
    explanation: |
      Paragraph 2 states: "Chinese merchants exported silk, porcelain, and tea;
      they imported glass, gold, and silver from the west." The other options
      mix up the direction of trade or describe goods from other regions.

