    passage_title: "What I Kept"
    passage_text: |
      I stood at the gate where the marigolds used to be,
      Now concrete and car and a stranger's clean porch.
      I did not go in. There was nothing left for me
      Except the map I carried, which no one else could torch.

      I kept the creak of the third step on the stair,
      The smell of rain caught in the curtains overnight,
      My mother's voice calling up through dusty air,
      The angle of November's early, sideways light.

      The house was sold. The house was someone else's now.
      But houses, I decided, are the wrong things to keep.
      What stays is not the wall, the window, or the bough —
      What stays is what we chose to store, before our sleep.

      I turned and walked. I carried nothing you could weigh.
      I carried everything that mattered, all the way.
    question: |
      What is the overall tone of the poem?
    choices:
      A: "Bitter and resentful toward those who bought the house."
      B: "Sad but ultimately accepting, with a sense of quiet resolve."
      C: "Joyful and celebratory about the memories of the past."
      D: "Anxious and uncertain about the speaker's future."
    answer: B
    explanation: |
      The speaker feels the loss of the childhood home but does not dwell in
      bitterness or despair. The final stanza — "I turned and walked. I carried
      everything that mattered" — suggests acceptance and resolution. The tone
      is elegiac (mourning something lost) but balanced by the speaker's
      deliberate choice to preserve what truly matters: memory.

