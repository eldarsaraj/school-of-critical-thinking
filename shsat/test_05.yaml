  # ============================================================
  # REVISING/EDITING — Q1–20 (standalone, no passage)
  # ============================================================

  - number: 1
    type: multiple_choice
    topic: Revising/Editing
    difficulty: easy
    question: |
      Read the sentence below. Which word best replaces the underlined word to make the meaning more precise?

      The detective said that the suspect had been at the scene of the crime.
    choices:
      A: "confirmed"
      B: "mentioned"
      C: "whispered"
      D: "implied"
    answer: A
    explanation: |
      "Said" is vague. "Confirmed" conveys that the detective established this as
      a fact, which is the most precise meaning in the context of a detective's
      statement. "Mentioned" is casual, "whispered" adds an unintended physical
      detail, and "implied" means the opposite of a direct statement.

  - number: 2
    type: multiple_choice
    topic: Revising/Editing
    difficulty: easy
    question: |
      Read the sentence below. Which revision corrects the error?

      She didn't see nobody waiting outside the library.
    choices:
      A: "She didn't see anybody waiting outside the library."
      B: "She didn't see nobody who waited outside the library."
      C: "She saw nobody that wasn't waiting outside the library."
      D: "She didn't see nobody, not ever, outside the library."
    answer: A
    explanation: |
      The original sentence contains a double negative: "didn't" and "nobody."
      In standard English, a single negative is correct. Replacing "nobody"
      with "anybody" eliminates the double negative while preserving the meaning.

  - number: 3
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Read the sentence below. Which revision corrects the error in parallel structure?

      Every morning, Priya enjoys running, to read the newspaper, and a cup of tea.
    choices:
      A: "Every morning, Priya enjoys running, reading the newspaper, and drinking a cup of tea."
      B: "Every morning, Priya enjoys to run, to read the newspaper, and to drink a cup of tea."
      C: "Every morning, Priya enjoys running, reading, and then to drink a cup of tea."
      D: "Every morning, Priya enjoys a run, the newspaper being read, and a cup of tea."
    answer: A
    explanation: |
      Items in a series must use the same grammatical form. The first item,
      "running," is a gerund (verb + -ing), so all items must be gerunds:
      "running," "reading the newspaper," and "drinking a cup of tea."

  - number: 4
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Read the sentence below. Which revision best corrects the error?

      The experiment produced surprising results, the researchers celebrated immediately.
    choices:
      A: "The experiment produced surprising results; the researchers celebrated immediately."
      B: "The experiment produced surprising results, however the researchers celebrated immediately."
      C: "The experiment produced surprising results and the researchers celebrated, immediately."
      D: "The experiment produced surprising results: the researchers celebrated immediately."
    answer: A
    explanation: |
      The original is a comma splice — two independent clauses joined only by a
      comma. The correct fix is to replace the comma with a semicolon, which
      properly joins two related independent clauses. Option B uses "however"
      incorrectly without a semicolon before it.

  - number: 5
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Read the sentence below. Which revision best corrects the error?

      Running to catch the bus, my backpack fell off my shoulder.
    choices:
      A: "Running to catch the bus, I felt my backpack fall off my shoulder."
      B: "While running, my backpack fell off my shoulder while I caught the bus."
      C: "My backpack, running to catch the bus, fell off my shoulder."
      D: "To run and catch the bus, my backpack fell off my shoulder."
    answer: A
    explanation: |
      The original has a dangling modifier. The participial phrase "Running to
      catch the bus" must refer to the grammatical subject of the main clause.
      The subject must be "I," not "my backpack," since backpacks do not run.
      Only option A correctly makes "I" the subject being modified.

  - number: 6
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Read the paragraph below. Which revision best fixes the underlined pronoun?

      The coach told the player that they needed to change their strategy before the final quarter.
    choices:
      A: "The coach told the player that the player needed to change the player's strategy before the final quarter."
      B: "The coach told the player that he or she needed to change the strategy before the final quarter."
      C: "The coach told the player that they both needed to change strategy before the final quarter."
      D: "The coach told the player, who needed to change their strategy, before the final quarter."
    answer: B
    explanation: |
      "They" is ambiguous — it could refer to the coach or the player. Option B
      clarifies that the pronoun refers to the player by using "he or she" and
      specifies "the strategy" to remove any remaining ambiguity.

  - number: 7
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Read the sentence below. Which revision corrects the error in subject-verb agreement?

      The collection of rare stamps, along with several handwritten letters, are stored in the vault.
    choices:
      A: "The collection of rare stamps, along with several handwritten letters, is stored in the vault."
      B: "The collection of rare stamps, along with several handwritten letters, were stored in the vault."
      C: "The collection of rare stamps and several handwritten letters is stored in the vault."
      D: "The collections of rare stamps, along with several handwritten letters, are stored in the vault."
    answer: A
    explanation: |
      The subject is "collection" (singular), not "stamps" or "letters."
      Phrases beginning with "along with" are parenthetical and do not change
      the number of the subject. A singular subject requires the singular verb
      "is stored."

  - number: 8
    type: multiple_choice
    topic: Revising/Editing
    difficulty: easy
    question: |
      Read the paragraph below. Which transition word or phrase best fills the blank?

      Scientists collected samples from three different sites. _______, they brought the samples to a laboratory for analysis.
    choices:
      A: "Meanwhile"
      B: "Afterward"
      C: "Nevertheless"
      D: "In contrast"
    answer: B
    explanation: |
      The paragraph describes events in time sequence: first collecting samples,
      then bringing them to a lab. "Afterward" is the correct transition to show
      that the second action followed the first. "Meanwhile" implies simultaneous
      events; "Nevertheless" and "In contrast" imply opposition.

  - number: 9
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Read the sentence below. Which revision eliminates the circular reasoning?

      This novel is the best book ever written because no other book is as good as this novel.
    choices:
      A: "This novel is the best book ever written because its characters, themes, and prose style have been praised by critics for decades."
      B: "This novel is the best book ever written because it is simply better than other books."
      C: "No book is as good as this novel, so this novel must therefore be better than all other books."
      D: "This novel is the best because it has been called the best by those who say it is the best."
    answer: A
    explanation: |
      Circular reasoning uses the conclusion as its own justification. The
      original simply restates "best" in different words. Option A replaces
      the circular claim with genuine supporting reasons: critical praise,
      character, theme, and prose quality.

  - number: 10
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Which of the following best combines the two sentences using a subordinating clause?

      The thunderstorm knocked out the power. The game was delayed for an hour.
    choices:
      A: "The thunderstorm knocked out the power, and the game was delayed for an hour."
      B: "Because the thunderstorm knocked out the power, the game was delayed for an hour."
      C: "Although the thunderstorm knocked out the power, the game was delayed for an hour."
      D: "The game was delayed for an hour, moreover the thunderstorm knocked out the power."
    answer: B
    explanation: |
      The relationship between the two events is cause and effect: the storm
      caused the delay. The subordinating conjunction "because" creates this
      causal relationship correctly. "Although" implies contrast, which
      misrepresents the relationship.

  - number: 11
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Read the group of words below. Which revision best corrects the error?

      Although the library closed early on Sunday.
    choices:
      A: "The library closed early on Sunday."
      B: "Although the library closed early on Sunday, many students had already finished their work."
      C: "Although the library closed early, on Sunday."
      D: "Although the library, closing early on Sunday."
    answer: B
    explanation: |
      The original is a sentence fragment — a dependent clause with no
      independent clause to complete it. Adding an independent clause ("many
      students had already finished their work") makes it a complete sentence.
      Option A removes "although" to create a simple sentence, which is also
      grammatically correct, but option B is the only one that completes the
      subordinating structure correctly.

  - number: 12
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Read the sentence below. Which version uses the apostrophe correctly?

      The _______ lounge has been renovated with new furniture.
    choices:
      A: "teacher's"
      B: "teachers'"
      C: "teachers's"
      D: "teacher's'"
    answer: B
    explanation: |
      The lounge belongs to multiple teachers (plural possessive). To form the
      possessive of a regular plural noun ending in -s, add only an apostrophe
      after the -s: teachers'. "Teacher's" is singular possessive (one teacher);
      "teachers's" and "teacher's'" are not standard forms.

  - number: 13
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Read the sentences below. Which version uses the underlined word correctly?

      (A) The speaker seemed to imply that the policy would change.
      (B) From the chart, we can imply that sales improved last quarter.
      (C) She inferred her disapproval clearly through her tone.
      (D) The data inferring that more research is needed.
    choices:
      A: "Sentence A"
      B: "Sentence B"
      C: "Sentence C"
      D: "Sentence D"
    answer: A
    explanation: |
      "Imply" means to suggest something without stating it directly — done by
      the speaker or writer. "Infer" means to draw a conclusion from evidence —
      done by the listener or reader. Only Sentence A uses "imply" correctly:
      the speaker is the one suggesting something indirectly.

  - number: 14
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Read the paragraph below. Which sentence does NOT belong in the paragraph?

      (1) The Amazon rainforest is home to more than three million species of plants and animals.
      (2) Deforestation threatens this biodiversity by destroying habitats.
      (3) Scientists estimate that dozens of species are lost to extinction every day.
      (4) Brazil's football team has won the FIFA World Cup five times.
      (5) Conservation efforts require international cooperation and funding.
    choices:
      A: "Sentence 1"
      B: "Sentence 2"
      C: "Sentence 3"
      D: "Sentence 4"
    answer: D
    explanation: |
      The paragraph is about biodiversity in the Amazon and the threat of
      deforestation. Sentence 4 — about Brazil's football victories — is
      entirely off-topic and does not support the paragraph's central idea.

  - number: 15
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Read the sentence below. Which revision is the most concise without losing meaning?

      Due to the fact that it was raining outside, the students who were in the school decided to remain inside the building and not go out.
    choices:
      A: "Because it was raining, the students stayed inside."
      B: "Due to the fact that rain was falling, students chose to remain inside."
      C: "Because of the rain outside, the students inside the school did not leave."
      D: "Since it was raining outside, students made the decision to stay inside the building."
    answer: A
    explanation: |
      "Due to the fact that" can be replaced by "Because." "Students who were
      in the school" simplifies to "the students," and "remain inside the
      building and not go out" simplifies to "stayed inside." Option A conveys
      the full meaning in the fewest words.

  - number: 16
    type: multiple_choice
    topic: Revising/Editing
    difficulty: hard
    question: |
      Read the paragraph below. A student wants to add a sentence to support the claim in the second sentence. Which sentence best does this?

      Urban parks benefit city residents in many ways. Regular access to green space has been shown to reduce stress. _______.
    choices:
      A: "Many cities are replacing parks with parking lots to meet growing demand."
      B: "Studies have found that people who visit parks at least twice a week report lower levels of anxiety than those who do not."
      C: "Trees in urban areas can also help lower air temperatures during hot summers."
      D: "Some parks are designed specifically for dogs, with dedicated off-leash areas."
    answer: B
    explanation: |
      The claim is that "regular access to green space has been shown to reduce
      stress." The supporting sentence must provide evidence for this specific
      claim. Option B directly supports it with a concrete study finding about
      park visits and lower anxiety. Options C and D discuss different benefits
      that do not directly address stress reduction.

  - number: 17
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Read the sentence below. Which version correctly uses a colon to introduce a list?
    choices:
      A: "The kit contained: a map, a compass, and a flashlight."
      B: "The kit contained the following items: a map, a compass, and a flashlight."
      C: "The kit: contained a map, a compass, and a flashlight."
      D: "The kit contained a map: a compass and a flashlight."
    answer: B
    explanation: |
      A colon should follow a complete independent clause before introducing a
      list. Option B is correct: "The kit contained the following items" is a
      complete clause. In option A, the colon interrupts the verb "contained" —
      a colon should not come directly after a verb.

  - number: 18
    type: multiple_choice
    topic: Revising/Editing
    difficulty: hard
    question: |
      Read the paragraph below. Which sentence makes the strongest conclusion?

      Throughout history, maps have done more than show where things are. They reflect the priorities and biases of those who made them. Ancient maps placed the mapmaker's homeland at the centre. Colonial-era maps emphasized European territories while leaving others blank or distorted.
    choices:
      A: "Maps are a very useful tool for navigating unfamiliar places."
      B: "In short, a map is never a neutral document — it is always a view of the world shaped by power."
      C: "Modern GPS technology has replaced the need for traditional maps."
      D: "Mapmakers today are more careful than those in the past."
    answer: B
    explanation: |
      A strong concluding sentence synthesizes the paragraph's ideas rather than
      introducing a new one or restating the obvious. Option B draws together the
      paragraph's evidence — bias, centrism, colonial distortion — into a unifying
      insight about maps and power. Options C and D introduce unrelated ideas.

  - number: 19
    type: multiple_choice
    topic: Revising/Editing
    difficulty: hard
    question: |
      Read the sentence below. Which revision uses the correct verb mood?

      If the committee votes in favour, the plan will go into effect immediately. But if I were in charge, I would restructure the proposal entirely.
    choices:
      A: "But if I was in charge, I would restructure the proposal entirely."
      B: "But if I were in charge, I would restructure the proposal entirely."
      C: "But if I am in charge, I would restructure the proposal entirely."
      D: "But if I be in charge, I would restructure the proposal entirely."
    answer: B
    explanation: |
      When expressing a condition contrary to fact (the speaker is not in
      charge), the subjunctive mood requires "were" regardless of the subject.
      Using "was" is informal and nonstandard in this context; "am" uses the
      indicative mood, which implies the condition may be true.

  - number: 20
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Which of the following best combines the two short sentences into one fluent sentence?

      The fog was thick. The hikers could barely see the trail ahead.
    choices:
      A: "The fog was thick and the hikers could barely see the trail ahead."
      B: "So thick was the fog that the hikers could barely see the trail ahead."
      C: "The fog was thick, the hikers could barely see the trail ahead."
      D: "The fog was thick, but the hikers could barely see the trail ahead."
    answer: B
    explanation: |
      Option B uses an inverted construction ("So thick was the fog that...")
      that is both fluent and expressive of the causal relationship. It avoids
      the comma splice of option C and the misleading contrast of option D
      ("but" implies the hikers saw well despite the fog, which is wrong).

  # ============================================================
  # READING COMPREHENSION — PASSAGE 1: Fiction (Q21–27)
  # ============================================================

  - number: 21
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: medium
    passage_id: passage_1
    passage_title: "Something True"
    passage_text: |
      Sofia had won three school art competitions in two years, and she still could not
      paint anything she believed in. She could render a vase of flowers with photographic
      accuracy — petals in shadow, stems bending under their own weight — but standing
      back from a finished canvas, she always felt the same hollow disappointment: it looked
      like a photograph of something beautiful, not like something beautiful itself.

      Her teacher, Mr. Okonkwo, noticed. "You have more technique than students twice your
      age," he told her one afternoon. "But technique is a starting point, not a destination.
      You have to find something you need to say, and then find out whether your technique is
      good enough to say it."

      Sofia thought about this for weeks. She made false starts: a skyline, a self-portrait,
      a bowl of fruit. Each one felt like a performance. Then, one rainy Saturday, she
      thought about her grandmother's kitchen — the yellow walls, the dented pot always on
      the stove, the way afternoon light fell across the table and made the ordinary things
      look briefly sacred. She had not visited that kitchen in three years. Her grandmother
      had died, and the house had been sold.

      She painted from memory, and it was the hardest thing she had ever done. Memory does
      not hold still. The yellow walls kept shifting; she had to decide what shade they
      really were, and in deciding, she understood that it didn't matter. What mattered was
      what the yellow meant — warmth, safety, a particular kind of peace she had not felt
      since. When she finished, the painting was technically imperfect. The proportions
      were slightly off. But she stood in front of it and felt nothing hollow.

      She brought it to Mr. Okonkwo. He looked at it for a long time without speaking.
      "Yes," he said finally. "That's what I meant."
    question: |
      What is Sofia's primary motivation for continuing to paint despite her dissatisfaction?
    choices:
      A: "She wants to impress Mr. Okonkwo and earn his approval."
      B: "She is searching for a way to paint something she genuinely believes in."
      C: "She hopes to win a fourth art competition and break her school's record."
      D: "She wants to paint a perfect reproduction of her grandmother's kitchen."
    answer: B
    explanation: |
      The opening paragraph establishes Sofia's motivation: despite winning competitions,
      she feels "hollow disappointment" because her paintings don't feel genuine.
      Her goal is to produce something she "believed in," not to win awards or
      please her teacher. Option D misrepresents the final painting — she paints
      from memory, knowing it won't be technically perfect.

  - number: 22
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: medium
    passage_id: passage_1
    question: |
      What can be inferred about why Sofia's earlier attempts — the skyline, the self-portrait,
      the bowl of fruit — all failed to satisfy her?
    choices:
      A: "They were technically too difficult for her current skill level."
      B: "They were subjects she chose for their visual appeal rather than personal meaning."
      C: "Mr. Okonkwo told her those subjects were not interesting enough."
      D: "She completed them too quickly without thinking about composition."
    answer: B
    explanation: |
      Sofia describes each earlier attempt as feeling "like a performance" —
      implying she was showing skill rather than expressing something personal.
      The passage never says the subjects were too difficult (she is technically
      advanced) or that Mr. Okonkwo rejected them.

  - number: 23
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: hard
    passage_id: passage_1
    question: |
      As used in paragraph 3, the word "sacred" most nearly means:
    choices:
      A: "religious and holy"
      B: "worthy of reverence and meaning"
      C: "bright and colourful"
      D: "ancient and unchanged"
    answer: B
    explanation: |
      In context, "sacred" describes how afternoon light made ordinary objects
      look "briefly sacred." Sofia is not describing a religious scene; she is
      describing how the light gave mundane things a quality of significance
      and beauty. "Worthy of reverence and meaning" captures this secular use
      of the word most accurately.

  - number: 24
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: hard
    passage_id: passage_1
    question: |
      In paragraph 4, Sofia realizes that "it didn't matter" what exact shade the walls were.
      What does this realisation reveal about her development as an artist?
    choices:
      A: "She has decided that accuracy in painting is less important than speed."
      B: "She understands that emotional truth matters more than literal accuracy."
      C: "She has given up trying to remember her grandmother's kitchen correctly."
      D: "She believes that abstract art is superior to realistic painting."
    answer: B
    explanation: |
      Sofia's realization is the story's turning point. She stops trying to
      reproduce exact physical reality and instead asks what the yellow "meant."
      The shift is from literal accuracy to emotional truth — which is the
      insight Mr. Okonkwo was pointing toward when he told her to "find
      something you need to say."

  - number: 25
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: medium
    passage_id: passage_1
    question: |
      Which of the following best describes the figurative meaning of Mr. Okonkwo's final
      words: "Yes. That's what I meant."
    choices:
      A: "He confirms that the painting's technique has finally met professional standards."
      B: "He acknowledges that Sofia has understood and acted on his earlier advice."
      C: "He is surprised that Sofia painted her grandmother instead of a still life."
      D: "He is telling Sofia that she should enter this painting in the next competition."
    answer: B
    explanation: |
      Mr. Okonkwo earlier told Sofia that technique is a starting point and
      that she must "find something you need to say." His final response —
      after a long, silent look — confirms that Sofia's painting demonstrates
      exactly that: art driven by genuine feeling, not technical display.
      His words refer back to his own earlier lesson.

  - number: 26
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: medium
    passage_id: passage_1
    question: |
      The phrase "Memory does not hold still" (paragraph 4) is best understood as:
    choices:
      A: "a literal observation that human memory is scientifically inaccurate"
      B: "a figurative expression meaning that memory shifts and is hard to pin down"
      C: "a criticism of Sofia's inability to concentrate while painting"
      D: "a suggestion that Sofia should have taken photographs of her grandmother's kitchen"
    answer: B
    explanation: |
      The phrase is figurative. Sofia uses "hold still" — language usually
      applied to a physical object being posed or photographed — to describe
      memory's instability. She cannot fix the yellow walls at a single shade
      because memory is fluid, not static. This is a metaphor, not a literal
      scientific claim.

  - number: 27
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: hard
    passage_id: passage_1
    question: |
      Which of the following best expresses the central theme of the story?
    choices:
      A: "Natural talent is more important than years of practice and hard work."
      B: "True artistic expression requires personal meaning, not just technical skill."
      C: "Grief over lost loved ones can inspire great works of art."
      D: "Art competitions are not a reliable measure of a painter's ability."
    answer: B
    explanation: |
      The story follows Sofia's journey from technical competence but emotional
      emptiness to genuine artistic expression through personal meaning. Mr.
      Okonkwo's advice and Sofia's breakthrough both point to the same insight:
      technique serves expression, not the other way around. Option C is a
      partial reading — grief is the occasion, not the theme.

  # ============================================================
  # READING COMPREHENSION — PASSAGE 2: Nonfiction/Science (Q28–34)
  # ============================================================

  - number: 28
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: medium
    passage_id: passage_2
    passage_title: "The Point of No Return"
    passage_text: |
      A black hole is a region of space where gravity is so intense that nothing — not even
      light — can escape. They form most commonly when a massive star exhausts its nuclear
      fuel and collapses under its own weight. If the star is large enough, the collapse
      continues until the matter is compressed into an infinitely dense point called a
      singularity. Surrounding this singularity is the event horizon: the boundary beyond
      which escape is impossible.

      The event horizon is not a physical surface. If you crossed it, you would not feel a
      wall or a change in temperature. You would simply be unable to return. Scientists
      calculate that, for a sufficiently large black hole, the gravitational forces at the
      event horizon would be mild enough that you might not notice the crossing at all —
      at least for a while. The trouble comes later. As you fall inward, the difference in
      gravitational pull between your head and your feet grows larger. This difference
      stretches the body lengthwise and compresses it sideways. Scientists call this process
      spaghettification.

      Because no light escapes a black hole, they cannot be observed directly. Instead,
      scientists detect them indirectly. One method involves watching nearby stars. When a
      star orbits an invisible massive object — behaving as if something is pulling it
      with extraordinary force — scientists infer that a black hole is present. Another
      method examines the radiation produced when matter falls into a black hole. As gas
      and dust spiral inward, they heat up to enormous temperatures and emit X-rays that
      telescopes can detect.

      In 2019, the first direct image of a black hole's shadow was produced by a global
      network of radio telescopes working as a single virtual telescope the size of Earth.
      The image showed the glowing ring of heated matter surrounding the dark centre of a
      black hole 6.5 billion times more massive than our sun.
    question: |
      According to the passage, what is the event horizon?
    choices:
      A: "The physical wall at the centre of a black hole that traps all matter."
      B: "The infinitely dense point at the core of a black hole."
      C: "The boundary beyond which nothing, including light, can escape."
      D: "The zone where spaghettification begins to affect the human body."
    answer: C
    explanation: |
      The passage defines the event horizon explicitly in paragraph 1: "the
      boundary beyond which escape is impossible." Option B describes the
      singularity, not the event horizon. Option A is contradicted by the
      passage, which states the event horizon is not a physical surface.

  - number: 29
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: medium
    passage_id: passage_2
    question: |
      According to the passage, how do scientists most commonly detect black holes?
    choices:
      A: "By photographing the light that black holes emit from their cores."
      B: "By measuring the temperature changes at the event horizon."
      C: "By observing the behaviour of nearby matter and the radiation it produces."
      D: "By listening for radio waves emitted directly by the singularity."
    answer: C
    explanation: |
      Paragraph 3 describes two indirect detection methods: observing stars
      that orbit invisible massive objects, and detecting X-rays from heated
      matter spiralling into the black hole. Both methods rely on observing
      matter near the black hole, not light from the black hole itself (which
      cannot escape).

  - number: 30
    type: multiple_choice
