    passage_text: |
      His father had arrived in January with one suitcase, a degree in civil engineering
      that no one here seemed to care about, and exactly zero experience with smartphones.
      Darius had been assigned — by no one officially, but by the obvious logic of being
      fourteen and American-born — as the family's designated explainer.

      He started with the basics. "This is the home screen. These are apps. You press
      this one to call someone." His father, Kaveh, listened with the focused expression
      he used for difficult problems — the same face he made over crosswords, or when
      Darius's mother asked him something he needed to think about carefully. He nodded
      but asked nothing. Darius took the nodding as understanding. It was not.

      Three days later, Darius found his father staring at the phone with the same
      expression, this time holding it sideways. "It stopped," Kaveh said. "I was looking
      at the — " he searched for the word " — the map. And it stopped." Darius looked.
      The phone had run out of battery. He had not told his father about charging.

      He slowed down. He drew pictures. He made a list on paper. His father studied
      the list as if it were a circuit diagram. He asked, now, many careful questions:
      Why does the map know where I am? Why does this number disappear when I press
      the wrong thing? If I delete a photograph, does it disappear from everywhere?
      Darius found that answering these questions was harder than he expected. He had
      never had to know why. He had only ever known how.

      One evening his father looked up from the phone and said, "You are teaching me
      quickly. I am learning slowly. Please do not match your speed to my slowness."
      Darius said nothing, because the sentence had caught him in something he could not
      name. He had been going faster, he realized. He had been going faster and calling
      it help.

      Weeks passed. His father learned — not quickly, but thoroughly. And one afternoon,
      when Darius was struggling with a geometry proof that would not resolve, Kaveh sat
      down beside him without being asked. He said nothing for several minutes. Then he
      pointed at the diagram and showed Darius an approach that had not occurred to him.
      Patient. Unhurried. Exactly the teacher he had needed.

      Darius thought about what his father had said about learning slowly. He had
      thought, at the time, that it was a request. Only now did he understand it was
      a lesson.
