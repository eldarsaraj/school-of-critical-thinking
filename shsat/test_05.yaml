      D: "He sat beside Darius and showed him an approach to the geometry proof that had not occurred to him."
    answer: D
    explanation: |
      The geometry scene in paragraph 6 is the clearest evidence of Kaveh's
      capability. Without being asked, he sits beside his son, waits patiently,
      then reveals an approach to a proof that Darius had not thought of. This
      demonstrates analytical intelligence, patience, and competence in his own
      domain. The engineering degree (option A) establishes credentials but is
      asserted, not demonstrated; option D shows it in action.

math:

  # ============================================================
  # MATH — Q1–52: Multiple Choice
  # ============================================================

  - number: 1
    type: multiple_choice
    topic: Number Theory
    difficulty: easy
    question: |
      What is the prime factorization of 84?
    choices:
      A: "2 x 3 x 14"
      B: "2^2 x 3 x 7"
      C: "2^2 x 21"
      D: "4 x 3 x 7"
    answer: B
    explanation: |
      84 / 2 = 42; 42 / 2 = 21; 21 / 3 = 7; 7 is prime.
      So 84 = 2^2 x 3 x 7. Options A, C, and D are not fully factored into
      prime factors only.

  - number: 2
    type: multiple_choice
    topic: Number Theory
    difficulty: easy
    question: |
      What is the Greatest Common Factor (GCF) of 48 and 72?
    choices:
      A: "12"
      B: "16"
      C: "24"
      D: "36"
    answer: C
    explanation: |
      Factors of 48: 1, 2, 3, 4, 6, 8, 12, 16, 24, 48.
      Factors of 72: 1, 2, 3, 4, 6, 8, 9, 12, 18, 24, 36, 72.
      The greatest common factor is 24.

  - number: 3
    type: multiple_choice
    topic: Number Theory
    difficulty: easy
    question: |
      What is the Least Common Multiple (LCM) of 48 and 72?
    choices:
      A: "96"
      B: "120"
      C: "144"
      D: "216"
    answer: C
    explanation: |
      LCM(48, 72) = (48 x 72) / GCF(48, 72) = 3456 / 24 = 144.
      Alternatively: 48 = 2^4 x 3; 72 = 2^3 x 3^2. LCM = 2^4 x 3^2 = 16 x 9 = 144.

  - number: 4
    type: multiple_choice
    topic: Number Theory
    difficulty: medium
    question: |
      Which of the following is NOT a perfect square?
    choices:
      A: "144"
      B: "169"
      C: "196"
      D: "210"
    answer: D
    explanation: |
      144 = 12^2, 169 = 13^2, 196 = 14^2. 210 falls between 14^2 = 196 and
      15^2 = 225, so it is not a perfect square.

  - number: 5
    type: multiple_choice
    topic: Number Theory
    difficulty: medium
    question: |
      What is the only perfect square between 50 and 70?
    choices:
      A: "54"
      B: "60"
      C: "64"
      D: "68"
    answer: C
    explanation: |
      7^2 = 49 (too small), 8^2 = 64 (between 50 and 70), 9^2 = 81 (too large).
      The only perfect square in the range is 64.

  - number: 6
    type: multiple_choice
    topic: Rational Numbers
    difficulty: easy
    question: |
      What is the value of -3 + (-8)?
    choices:
      A: "5"
      B: "-5"
      C: "11"
      D: "-11"
    answer: D
    explanation: |
      Adding two negative numbers: -3 + (-8) = -(3 + 8) = -11.

  - number: 7
    type: multiple_choice
    topic: Rational Numbers
    difficulty: medium
    question: |
      What is the value of |(-4)^2 - 3 x (-4)|?
    choices:
      A: "4"
      B: "16"
      C: "28"
      D: "-28"
    answer: C
    explanation: |
      (-4)^2 = 16. 3 x (-4) = -12. 16 - (-12) = 16 + 12 = 28.
      |28| = 28.

  - number: 8
    type: multiple_choice
    topic: Rational Numbers
    difficulty: medium
    question: |
      What is (-2/3) x (-9/4)?
    choices:
      A: "-3/2"
      B: "3/2"
      C: "-6"
      D: "6/7"
    answer: B
    explanation: |
      Negative x negative = positive.
      (2/3) x (9/4) = 18/12 = 3/2.
      So (-2/3) x (-9/4) = 3/2.

  - number: 9
    type: multiple_choice
    topic: Rational Numbers
    difficulty: easy
    question: |
      What is |-7| + |3| - |-2|?
    choices:
      A: "2"
      B: "6"
      C: "8"
      D: "12"
    answer: C
    explanation: |
      |-7| = 7, |3| = 3, |-2| = 2.
      7 + 3 - 2 = 8.

  - number: 10
    type: multiple_choice
    topic: Rational Numbers
    difficulty: medium
    question: |
      What is the value of (-5)^3?
    choices:
      A: "125"
      B: "-15"
      C: "15"
      D: "-125"
    answer: D
    explanation: |
      (-5)^3 = (-5) x (-5) x (-5) = 25 x (-5) = -125.
      An odd power of a negative number is negative.

  - number: 11
    type: multiple_choice
    topic: Ratio and Proportion
    difficulty: medium
    question: |
      A recipe uses 3 cups of flour for every 4 cups of sugar. If a baker uses 60 cups of
      sugar, how many cups of flour are needed?
    choices:
      A: "40"
      B: "45"
      C: "48"
      D: "80"
    answer: B
    explanation: |
      Set up the proportion: 3/4 = x/60.
      Cross-multiply: 4x = 180, so x = 45 cups of flour.

  - number: 12
    type: multiple_choice
    topic: Ratio and Proportion
    difficulty: easy
    question: |
      A car travels 120 miles in 2.5 hours. What is its average speed in miles per hour?
    choices:
      A: "42 mph"
      B: "46 mph"
      C: "48 mph"
      D: "50 mph"
    answer: C
    explanation: |
      Speed = distance / time = 120 / 2.5 = 48 miles per hour.

  - number: 13
    type: multiple_choice
    topic: Ratio and Proportion
    difficulty: medium
    question: |
      A map uses a scale of 1 cm : 250 cm. A measurement on the map is 3.2 cm.
      What is the actual distance in meters?
    choices:
      A: "6 m"
      B: "8 m"
      C: "32 m"
      D: "80 m"
    answer: B
    explanation: |
      Actual distance = 3.2 x 250 = 800 cm = 8 metres.

  - number: 14
    type: multiple_choice
    topic: Ratio and Proportion
    difficulty: medium
    question: |
      Two groups of students have a ratio of 5:3. Together there are 40 students.
      How many students are in the larger group?
    choices:
      A: "15"
      B: "20"
      C: "25"
      D: "30"
    answer: C
    explanation: |
      Total parts = 5 + 3 = 8. Each part = 40 / 8 = 5 students.
      Larger group = 5 x 5 = 25 students.

  - number: 15
    type: multiple_choice
    topic: Ratio and Proportion
    difficulty: medium
    question: |
      A bag of rice weighs 2.5 kg. Each portion requires 125 g. How many portions can
      be made from one bag?
    choices:
      A: "10"
      B: "16"
      C: "20"
      D: "25"
    answer: C
    explanation: |
      2.5 kg = 2500 g. Number of portions = 2500 / 125 = 20.

  - number: 16
    type: multiple_choice
    topic: Algebra
    difficulty: medium
    question: |
      If 3x - 7 = 14, what is the value of x?
    choices:
      A: "5"
      B: "6"
      C: "7"
      D: "9"
    answer: C
    explanation: |
      3x - 7 = 14 -> 3x = 21 -> x = 7.

  - number: 17
    type: multiple_choice
    topic: Algebra
    difficulty: medium
    question: |
      If 2(3x + 1) = 4x + 10, what is the value of x?
    choices:
      A: "2"
      B: "3"
      C: "4"
      D: "5"
    answer: C
    explanation: |
      Expand: 6x + 2 = 4x + 10. Subtract 4x: 2x + 2 = 10.
      Subtract 2: 2x = 8. Divide: x = 4.

  - number: 18
    type: multiple_choice
    topic: Algebra
    difficulty: medium
    question: |
      If y = 2x - 3 and x = 5, what is the value of x + y?
    choices:
      A: "10"
      B: "11"
      C: "12"
      D: "14"
    answer: C
    explanation: |
      Substitute x = 5: y = 2(5) - 3 = 10 - 3 = 7.
      x + y = 5 + 7 = 12.

  - number: 19
    type: multiple_choice
    topic: Algebra
    difficulty: medium
    question: |
      Which of the following is the simplified form of (4x^2 y) / (2xy)?
    choices:
      A: "2x^2"
      B: "2x"
      C: "2y"
      D: "2xy"
    answer: B
    explanation: |
      (4x^2 y) / (2xy) = (4/2) x (x^2/x) x (y/y) = 2 x x x 1 = 2x.

  - number: 20
    type: multiple_choice
    topic: Algebra
    difficulty: medium
    question: |
      If a = -2, what is the value of 3a^2 - a?
    choices:
      A: "10"
      B: "12"
      C: "14"
      D: "16"
    answer: C
    explanation: |
      a^2 = (-2)^2 = 4. So 3a^2 = 12.
      -a = -(-2) = 2.
      3a^2 - a = 12 + 2 = 14.

  - number: 21
    type: multiple_choice
    topic: Algebra
    difficulty: medium
    question: |
      The sum of two numbers is 20 and their difference is 6. What is the product of the
      two numbers?
    choices:
      A: "84"
      B: "88"
      C: "91"
      D: "96"
    answer: C
    explanation: |
      Let the numbers be x and y. x + y = 20 and x - y = 6.
      Adding: 2x = 26, so x = 13. Then y = 20 - 13 = 7.
      Product = 13 x 7 = 91.

  - number: 22
    type: multiple_choice
    topic: Algebra
    difficulty: medium
    question: |
      If 2x + 3y = 18 and x = 3, what is the value of y?
    choices:
      A: "2"
      B: "4"
      C: "6"
      D: "8"
    answer: B
    explanation: |
      Substitute x = 3: 2(3) + 3y = 18 -> 6 + 3y = 18 -> 3y = 12 -> y = 4.

  - number: 23
    type: multiple_choice
    topic: Algebra
    difficulty: hard
    question: |
      A store sells pens and notebooks. 3 pens and 2 notebooks cost $26. 2 pens and
      3 notebooks cost $24. What is the combined cost of 1 pen and 1 notebook?
    choices:
      A: "$8"
      B: "$9"
      C: "$10"
      D: "$11"
    answer: C
    explanation: |
      Let p = pen cost, n = notebook cost.
      3p + 2n = 26 (1)
      2p + 3n = 24 (2)
      Multiply (1) by 3: 9p + 6n = 78.
      Multiply (2) by 2: 4p + 6n = 48.
      Subtract: 5p = 30, so p = 6.
      Substitute: 3(6) + 2n = 26 -> 2n = 8 -> n = 4.
      p + n = 6 + 4 = $10.

  - number: 24
    type: multiple_choice
    topic: Algebra
    difficulty: medium
    question: |
      If n = 7, what is the value of n^2 - n?
    choices:
      A: "36"
      B: "40"
      C: "42"
      D: "49"
    answer: C
    explanation: |
      n^2 - n = 7^2 - 7 = 49 - 7 = 42.

  - number: 25
    type: multiple_choice
    topic: Algebra
    difficulty: medium
    question: |
      Three consecutive even integers have a sum of 78. What is the largest of the three?
    choices:
      A: "24"
      B: "26"
      C: "28"
      D: "30"
    answer: C
    explanation: |
      Let the integers be n, n+2, n+4.
      n + (n+2) + (n+4) = 78 -> 3n + 6 = 78 -> 3n = 72 -> n = 24.
      The three integers are 24, 26, 28. The largest is 28.

  - number: 26
    type: multiple_choice
    topic: Geometry
    difficulty: medium
    question: |
      Two parallel lines are cut by a transversal. One of the angles formed measures 115
      degrees. What is the measure of the co-interior angle (same-side interior angle)
      on the same side of the transversal?
    choices:
      A: "65"
      B: "75"
      C: "115"
      D: "125"
    answer: A
    explanation: |
      Co-interior angles (same-side interior angles) are supplementary when lines
      are parallel: they add up to 180 degrees.
      180 - 115 = 65 degrees.

  - number: 27
    type: multiple_choice
    topic: Geometry
    difficulty: medium
    question: |
      Two vertical angles are formed by intersecting lines. One angle measures (3x + 15)
      degrees and its vertical angle measures (5x - 7) degrees. What is the value of x?
    choices:
      A: "9"
      B: "11"
      C: "13"
      D: "15"
    answer: B
    explanation: |
      Vertical angles are equal: 3x + 15 = 5x - 7.
      15 + 7 = 5x - 3x -> 22 = 2x -> x = 11.

  - number: 28
    type: multiple_choice
    topic: Geometry
    difficulty: medium
    question: |
      The angles of a triangle are in the ratio 1:2:3. What is the measure of the largest
      angle in degrees?
    choices:
      A: "60"
      B: "80"
      C: "90"
      D: "120"
    answer: C
    explanation: |
      The angles are x, 2x, and 3x. Their sum is 180 degrees.
      x + 2x + 3x = 180 -> 6x = 180 -> x = 30.
      Largest angle = 3 x 30 = 90 degrees.

  - number: 29
    type: multiple_choice
    topic: Geometry
    difficulty: medium
    question: |
      Two supplementary angles are (4x + 10) degrees and (2x + 2) degrees.
      What is the value of x?
    choices:
      A: "24"
      B: "26"
      C: "28"
      D: "30"
    answer: C
    explanation: |
      Supplementary angles sum to 180 degrees.
      (4x + 10) + (2x + 2) = 180 -> 6x + 12 = 180 -> 6x = 168 -> x = 28.

  - number: 30
    type: multiple_choice
    topic: Geometry
    difficulty: medium
    question: |
      Two parallel lines are cut by a transversal. Alternate interior angles satisfy
      (2x + 30) = (3x - 10). What is the measure of each angle in degrees?
    choices:
      A: "100"
      B: "105"
      C: "110"
      D: "120"
    answer: C
    explanation: |
      Alternate interior angles are equal: 2x + 30 = 3x - 10.
      30 + 10 = 3x - 2x -> 40 = x.
      Angle = 2(40) + 30 = 80 + 30 = 110 degrees.

  - number: 31
    type: multiple_choice
    topic: Geometry
    difficulty: medium
    question: |
      What is the surface area of a rectangular prism with length 6, width 4, and height 3?
    choices:
      A: "72"
      B: "96"
      C: "108"
      D: "120"
    answer: C
    explanation: |
      SA = 2(lw + lh + wh) = 2(6x4 + 6x3 + 4x3) = 2(24 + 18 + 12) = 2(54) = 108.

  - number: 32
    type: multiple_choice
    topic: Geometry
    difficulty: medium
    question: |
      A triangular prism has a triangular base with base 6 and height 4, and the prism
      has a length of 10. What is the volume of the prism?
    choices:
      A: "100"
      B: "110"
      C: "120"
      D: "240"
    answer: C
    explanation: |
      Volume = base area x length.
      Base area (triangle) = (1/2) x 6 x 4 = 12.
      Volume = 12 x 10 = 120.

  - number: 33
    type: multiple_choice
    topic: Geometry
    difficulty: hard
    question: |
      A square pyramid has a square base with side length 8 and a slant height of 5.
      What is the total surface area of the pyramid?
    choices:
      A: "124"
      B: "134"
      C: "144"
      D: "160"
    answer: C
    explanation: |
      Total SA = base area + lateral area.
      Base area = 8^2 = 64.
      Lateral area = 4 x (1/2 x 8 x 5) = 4 x 20 = 80.
      Total SA = 64 + 80 = 144.

  - number: 34
    type: multiple_choice
    topic: Geometry
    difficulty: medium
    question: |
      A cube has a total surface area of 150 square units. What is its volume?
    choices:
      A: "25"
      B: "75"
      C: "100"
      D: "125"
    answer: D
    explanation: |
      SA = 6s^2 = 150 -> s^2 = 25 -> s = 5.
      Volume = s^3 = 5^3 = 125.

  - number: 35
    type: multiple_choice
    topic: Geometry
    difficulty: medium
    question: |
      A rectangular prism has a volume of 840 cubic units. Its length is 10 and its
      width is 7. What is its height?
    choices:
      A: "10"
      B: "12"
      C: "14"
      D: "16"
    answer: B
    explanation: |
      Volume = l x w x h -> 840 = 10 x 7 x h -> 840 = 70h -> h = 12.

  - number: 36
    type: multiple_choice
    topic: Coordinate Geometry
    difficulty: medium
    question: |
      What is the midpoint of the line segment connecting (2, 8) and (6, 4)?
    choices:
      A: "(3, 5)"
      B: "(4, 6)"
      C: "(4, 5)"
      D: "(5, 6)"
    answer: B
    explanation: |
      Midpoint = ((x1 + x2)/2, (y1 + y2)/2) = ((2+6)/2, (8+4)/2) = (4, 6).

  - number: 37
    type: multiple_choice
    topic: Coordinate Geometry
    difficulty: medium
    question: |
      What is the distance between the points (1, 2) and (4, 6)?
    choices:
      A: "4"
      B: "5"
      C: "6"
      D: "7"
    answer: B
    explanation: |
      Distance = sqrt((4-1)^2 + (6-2)^2) = sqrt(9 + 16) = sqrt(25) = 5.

  - number: 38
    type: multiple_choice
    topic: Coordinate Geometry
    difficulty: medium
    question: |
      The point (3, -5) is reflected over the x-axis. What are the coordinates of
      the reflected point?
    choices:
      A: "(-3, 5)"
      B: "(3, 5)"
      C: "(-3, -5)"
      D: "(5, -3)"
    answer: B
    explanation: |
      Reflecting a point over the x-axis changes the sign of the y-coordinate
      while the x-coordinate remains the same. (3, -5) -> (3, 5).

  - number: 39
    type: multiple_choice
    topic: Probability
    difficulty: medium
    question: |
      Events A and B are independent. P(A) = 1/3 and P(B) = 1/4.
      What is P(A and B)?
    choices:
      A: "1/12"
      B: "1/7"
      C: "7/12"
      D: "1/6"
    answer: A
    explanation: |
      For independent events, P(A and B) = P(A) x P(B) = (1/3) x (1/4) = 1/12.

  - number: 40
    type: multiple_choice
    topic: Probability
    difficulty: medium
    question: |
      A spinner is divided into 4 equal sections labelled 1, 2, 3, and 4. What is the
      probability of spinning a prime number?
    choices:
      A: "1/4"
      B: "1/2"
      C: "3/4"
      D: "1"
    answer: B
    explanation: |
      Prime numbers among {1, 2, 3, 4}: 2 and 3 are prime. (1 is not prime; 4 is not prime.)
      P(prime) = 2/4 = 1/2.

  - number: 41
    type: multiple_choice
    topic: Probability
    difficulty: hard
    question: |
      A bag contains cards numbered 1 through 5. Two cards are drawn without replacement.
      What is the probability that both cards show even numbers?
    choices:
      A: "1/20"
      B: "1/10"
      C: "2/5"
      D: "4/25"
    answer: B
    explanation: |
      Even numbers in {1, 2, 3, 4, 5}: {2, 4} -- two cards.
      P(first even) = 2/5.
      P(second even | first was even) = 1/4 (one even card left, four remaining).
      P(both even) = (2/5) x (1/4) = 2/20 = 1/10.

  - number: 42
    type: multiple_choice
    topic: Probability
    difficulty: hard
    question: |
      A game pays $6 if you win and you lose $2 if you lose. The probability of winning
      is 1/3. What is the expected value of one play of the game?
    choices:
      A: "$2/3"
      B: "$1"
      C: "$2"
      D: "$4"
    answer: A
    explanation: |
      Expected value = (6 x 1/3) + (-2 x 2/3) = 2 - 4/3 = 6/3 - 4/3 = 2/3.
      The expected value is $2/3 per play.

  - number: 43
    type: multiple_choice
    topic: Probability
    difficulty: medium
    question: |
      A fair coin is flipped twice. What is the probability of getting at least one head?
    choices:
      A: "1/4"
      B: "1/2"
      C: "3/4"
      D: "1"
    answer: C
    explanation: |
      Sample space: HH, HT, TH, TT (4 equally likely outcomes).
      Outcomes with at least one head: HH, HT, TH (3 outcomes).
      P(at least one head) = 3/4.
      Alternatively: 1 - P(no heads) = 1 - 1/4 = 3/4.

  - number: 44
    type: multiple_choice
    topic: Word Problems
    difficulty: hard
    question: |
      A chemist has 40 litres of a 25% salt solution. How many litres of a 55% salt
      solution must be added to produce a 35% salt solution?
    choices:
      A: "10"
      B: "15"
      C: "20"
      D: "25"
    answer: C
    explanation: |
      Let x = litres of 55% solution to add.
      0.25(40) + 0.55x = 0.35(40 + x).
      10 + 0.55x = 14 + 0.35x.
      0.20x = 4 -> x = 20 litres.

  - number: 45
    type: multiple_choice
    topic: Word Problems
    difficulty: hard
    question: |
      A father is four times as old as his son. In 6 years, the father will be three times
      as old as his son. What is the sum of their current ages?
    choices:
      A: "48"
      B: "54"
      C: "58"
      D: "60"
    answer: D
    explanation: |
      Let son's age = s, father's age = 4s.
      In 6 years: 4s + 6 = 3(s + 6) -> 4s + 6 = 3s + 18 -> s = 12.
      Father = 4 x 12 = 48. Sum = 12 + 48 = 60.

  - number: 46
    type: multiple_choice
    topic: Word Problems
    difficulty: hard
    question: |
      Worker A can complete a job in 6 hours. Worker B can complete the same job in
      4 hours. How long will it take them working together?
    choices:
      A: "5 hours"
      B: "12/5 hours"
      C: "5/12 hours"
      D: "2 hours"
    answer: B
    explanation: |
      Combined rate = 1/6 + 1/4 = 2/12 + 3/12 = 5/12 of the job per hour.
      Time = 1 / (5/12) = 12/5 hours.

  - number: 47
    type: multiple_choice
    topic: Word Problems
    difficulty: medium
    question: |
      A shipment of 120 items is split into two boxes. Box A contains 3 more than twice
      the number in Box B. How many items are in Box A?
    choices:
      A: "78"
      B: "79"
      C: "81"
      D: "82"
    answer: C
    explanation: |
      Let Box B = b. Then Box A = 2b + 3.
      b + (2b + 3) = 120 -> 3b + 3 = 120 -> 3b = 117 -> b = 39.
      Box A = 2(39) + 3 = 78 + 3 = 81.

  - number: 48
    type: multiple_choice
    topic: Word Problems
    difficulty: hard
    question: |
      A train travels 240 miles. It covers the first 120 miles at 60 mph and the
      remaining 120 miles at 80 mph. What is the total travel time in hours?
    choices:
      A: "3 hours"
      B: "3.5 hours"
      C: "4 hours"
      D: "4.5 hours"
    answer: B
    explanation: |
      Time for first half = 120 / 60 = 2 hours.
      Time for second half = 120 / 80 = 1.5 hours.
      Total time = 2 + 1.5 = 3.5 hours.

  - number: 49
    type: multiple_choice
    topic: Word Problems
    difficulty: hard
    question: |
