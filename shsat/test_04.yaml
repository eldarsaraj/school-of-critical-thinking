  # --- Q1–5: Integers — Absolute Value, Number Lines, Ordering ---

  - number: 1
    type: multiple_choice
    topic: Integers
    difficulty: easy
    question: "What is the value of |−7|?"
    choices:
      A: "7"
      B: "−7"
      C: "0"
      D: "49"
    answer: A
    explanation: "The absolute value of a number is its distance from zero on the number line. |−7| = 7 because −7 is 7 units from zero."

  - number: 2
    type: multiple_choice
    topic: Integers
    difficulty: easy
    question: "On a number line, which number is farthest to the right?"
    choices:
      A: "−3"
      B: "−8"
      C: "−1"
