  # ================================================================
  # PART 1 — REVISING / EDITING (Questions 1–20)
  # ================================================================

  - number: 1
    type: multiple_choice
    topic: Revising/Editing
    difficulty: easy
    question: |
      Read the sentence below and choose the best revision.

      "The library closes at nine o'clock tonight it will reopen tomorrow at eight in the morning."
    choices:
      A: "The library closes at nine o'clock tonight, it will reopen tomorrow at eight in the morning."
      B: "The library closes at nine o'clock tonight. It will reopen tomorrow at eight in the morning."
      C: "The library closes at nine o'clock tonight but it will reopen tomorrow at eight in the morning."
      D: "The library closes at nine o'clock tonight, however it will reopen tomorrow at eight in the morning."
    answer: B
    explanation: |
      The original is a fused (run-on) sentence — two independent clauses joined with no
      punctuation or conjunction. Choice B correctly separates them into two complete
      sentences. Choice A creates a comma splice. Choice C needs a comma before "but."
      Choice D needs a semicolon before "however."

  - number: 2
    type: multiple_choice
    topic: Revising/Editing
    difficulty: easy
    question: |
      Read the sentence below and choose the best revision of the underlined portion.

      "Maya loves to read mystery novels[, she finishes] one almost every week."
    choices:
      A: "mystery novels she finishes"
      B: "mystery novels; she finishes"
      C: "mystery novels, and she finishes"
      D: "mystery novels, but she finishes"
    answer: C
    explanation: |
      The original sentence is a comma splice — two independent clauses joined only by a
      comma. Choice C correctly adds the coordinating conjunction "and" after the comma,
      making it a proper compound sentence. Choice B (semicolon alone) would also be
      grammatically correct but is not offered as a clean option here. Choice D implies
      contrast where none exists.

  - number: 3
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Read the sentence below. Which word best replaces the underlined word?

      "The award will be given to [whomever] scores the highest on the exam."
    choices:
      A: "whoever"
      B: "who"
      C: "whom"
      D: "No revision needed."
    answer: A
    explanation: |
      The pronoun is the subject of the clause "scores the highest on the exam," so the
      subjective case "whoever" is correct. "Whomever" is the objective case. The entire
      clause "whoever scores the highest" serves as the object of the preposition "to,"
      but the pronoun itself is the subject within that clause.

  - number: 4
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Read the sentence below. Which revision best corrects the error in parallel structure?

      "The new employee was praised for being punctual, her dedication, and because she worked efficiently."
    choices:
      A: "for being punctual, her dedication, and her efficient work"
      B: "for being punctual, being dedicated, and working efficiently"
      C: "for punctual, dedicated, and efficient"
      D: "for punctuality, dedication, and because she was efficient"
    answer: B
    explanation: |
      For parallel structure, all items in a list must use the same grammatical form. The
      original mixes a gerund phrase, a noun phrase, and a subordinate clause. Choice B
      uses three parallel gerund phrases: "being punctual, being dedicated, and working
      efficiently."

  - number: 5
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Read the sentence below. Which revision best corrects the misplaced modifier?

      "Covered in chocolate frosting, the children eagerly ate the birthday cake."
    choices:
      A: "The children, covered in chocolate frosting, eagerly ate the birthday cake."
      B: "Eagerly, the children ate the birthday cake covered in chocolate frosting."
      C: "The children eagerly ate the birthday cake, which was covered in chocolate frosting."
      D: "Covered in chocolate frosting, the birthday cake was eagerly eaten by the children."
    answer: D
    explanation: |
      As written, the modifier "covered in chocolate frosting" incorrectly appears to
      describe "the children." Choice D places the modifier immediately next to "birthday
      cake," which is what was actually covered in frosting, while keeping the participial
      phrase in the opening position.

  - number: 6
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Read the sentence below. Which revision best corrects the dangling participle?

      "Having practiced for months, the audition felt easy to the young singer."
    choices:
      A: "Having practiced for months, the young singer found the audition easy."
      B: "The young singer, having practiced for months, the audition felt easy."
      C: "After months of practice, the audition that the young singer took felt easy."
      D: "The audition felt easy, having practiced for months, to the young singer."
    answer: A
    explanation: |
      A dangling participle occurs when the participial phrase does not logically connect
      to the subject of the main clause. "Having practiced for months" must describe the
      young singer, not the audition. Choice A corrects this by making "the young singer"
      the subject immediately after the participial phrase.

  - number: 7
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Read the sentence below. Which revision best corrects the verb error?

      "The committee have not yet reached a decision on the new budget proposal."
    choices:
      A: "has not yet reached"
      B: "had not yet reached"
      C: "were not yet reaching"
      D: "No revision needed."
    answer: A
    explanation: |
      Collective nouns like "committee," "team," and "jury" take singular verbs in
      standard American English when the group acts as a single unit. Since the committee
      is acting as one body, "has" (singular) is correct.

  - number: 8
    type: multiple_choice
    topic: Revising/Editing
    difficulty: easy
    question: |
      Read the sentence below. Which revision best eliminates the redundancy?

      "The biography told the life story of the author's entire life from birth to death."
    choices:
      A: "The biography told the life story of the author from birth to death."
      B: "The biography told the story of the author's entire life from birth to death."
      C: "The biography told the entire life story of the author's life."
      D: "The biography told the complete story of the author's entire life."
    answer: B
    explanation: |
      The original redundantly says both "life story" and "the author's entire life."
      Choice B removes "life" from "life story," yielding "the story of the author's
      entire life" — concise and non-redundant. Choice D adds another redundancy
      ("complete" and "entire").

  - number: 9
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Read the sentence below. Which word best completes it with the most precise connotation?

      "The politician's speech was __________ because it shifted positions depending on the audience."
    choices:
      A: "flexible"
      B: "adaptable"
      C: "calculating"
      D: "duplicitous"
    answer: D
    explanation: |
      "Duplicitous" means deliberately deceptive — saying different things to different
      people to gain favor. This precisely captures the meaning. "Flexible" and "adaptable"
      are positive in connotation and do not carry the dishonesty implied. "Calculating"
      suggests strategy but lacks the specific sense of two-faced deception.

  - number: 10
    type: multiple_choice
    topic: Revising/Editing
    difficulty: easy
    question: |
      Read the passage below. Which revision best corrects the underlined sentence fragment?

      "The school's new science lab. [Filled with state-of-the-art equipment donated by local businesses.]"
    choices:
      A: "The school's new science lab, filled with state-of-the-art equipment donated by local businesses."
      B: "The school's new science lab is filled with state-of-the-art equipment donated by local businesses."
      C: "The school's new science lab; filled with state-of-the-art equipment donated by local businesses."
      D: "No revision needed."
    answer: B
    explanation: |
      The underlined portion is a fragment — it lacks a main verb. Choice B adds the verb
      "is," creating a complete sentence. Choices A and C attach the fragment to the
      preceding sentence but still lack a main verb for the overall construction.

  - number: 11
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Read the passage below. Which transition word or phrase best fills the blank to show contrast?

      "Solar energy is growing in popularity. __________, many households still rely primarily on fossil fuels."
    choices:
      A: "Furthermore"
      B: "As a result"
      C: "Nevertheless"
      D: "In addition"
    answer: C
    explanation: |
      The second sentence presents information that contrasts with the first — even though
      solar energy is growing, fossil fuels remain dominant. "Nevertheless" signals this
      contrast correctly. "Furthermore" and "In addition" signal addition; "As a result"
      signals a consequence.

  - number: 12
    type: multiple_choice
    topic: Revising/Editing
    difficulty: easy
    question: |
      Read the passage below. Which transition word best fills the blank to show addition?

      "Regular exercise improves cardiovascular health. __________, it has been shown to reduce symptoms of anxiety and depression."
    choices:
      A: "However"
      B: "Moreover"
      C: "Therefore"
      D: "On the contrary"
    answer: B
    explanation: |
      The second sentence adds another benefit of exercise. "Moreover" signals the
      addition of a closely related point. "However" and "On the contrary" signal
      contrast; "Therefore" signals a logical conclusion.

  - number: 13
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Read the two sentences below. Which option best combines them using a participial phrase?

      "Sentence 1: The students completed their research projects."
      "Sentence 2: They submitted them before the Friday deadline."
    choices:
      A: "The students completed their research projects, and they submitted them before the Friday deadline."
      B: "Having completed their research projects, the students submitted them before the Friday deadline."
      C: "After the students completed their research projects, they submitted them before the Friday deadline."
      D: "The students completed their research projects; they submitted them before the Friday deadline."
    answer: B
    explanation: |
      A participial phrase begins with a participle and modifies the subject of the main
      clause. Choice B correctly uses the participial phrase "Having completed their
      research projects" to modify "the students." Choices A, C, and D use conjunctions
      or semicolons, not participial phrases.

  - number: 14
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Read the sentence below. Which revision most effectively changes it to active voice?

      "The experiment was conducted by the research team over a period of three years."
    choices:
      A: "Over three years, the experiment had been conducted by the research team."
      B: "The research team conducted the experiment over three years."
      C: "The experiment, conducted by the research team, took three years."
      D: "Over a period of three years, the experiment was being conducted."
    answer: B
    explanation: |
      In active voice, the subject performs the action. Choice B makes "the research
      team" the subject performing "conducted." Choices A and D remain in passive voice.
      Choice C uses a participial phrase but the main verb "took" still makes the
      experiment the grammatical subject.

  - number: 15
    type: multiple_choice
    topic: Revising/Editing
    difficulty: easy
    question: |
      Read the sentence below. Which revision best corrects the apostrophe error?

      "The dog wagged it's tail enthusiastically when its owner returned home."
    choices:
      A: "The dog wagged its tail enthusiastically when it's owner returned home."
      B: "The dog wagged its tail enthusiastically when its owner returned home."
      C: "The dog wagged it's tail enthusiastically when it's owner returned home."
      D: "No revision needed."
    answer: B
    explanation: |
      "It's" is a contraction meaning "it is." The possessive pronoun is "its" (no
      apostrophe). In the original, "it's tail" incorrectly uses the contraction where
      the possessive is needed. The second "its" is already correct. Choice B fixes
      only the one error that exists.

  - number: 16
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Read the paragraph below. Which sentence should be removed to improve focus?

      "(1) Photosynthesis is the process by which plants convert sunlight into food.
      (2) Plants absorb carbon dioxide through tiny pores called stomata.
      (3) Chlorophyll, the pigment that makes plants green, captures light energy.
      (4) Many plants are also used in traditional medicine around the world.
      (5) The plant then uses this energy to turn carbon dioxide and water into glucose."
    choices:
      A: "Sentence 2"
      B: "Sentence 3"
      C: "Sentence 4"
      D: "Sentence 5"
    answer: C
    explanation: |
      The paragraph is about the process of photosynthesis. Sentence 4 — about plants
      being used in traditional medicine — is off-topic and disrupts the paragraph's
      focus. All other sentences directly describe steps or components of photosynthesis.

  - number: 17
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Read the paragraph below. Which sentence best serves as its topic sentence?

      "__________ First, the city installed hundreds of new bike lanes along major roads.
      Then, it launched a public bike-share program so residents could rent bicycles cheaply.
      Finally, it ran a public awareness campaign encouraging people to cycle to work."
    choices:
      A: "Cycling is a popular form of exercise in many countries around the world."
      B: "The city took several steps to make cycling a practical choice for commuters."
      C: "Bike lanes are an important safety feature for urban cyclists."
      D: "The bike-share program was the most successful initiative the city launched."
    answer: B
    explanation: |
      A good topic sentence introduces the paragraph's main idea without being too broad
      or too specific. Choice B accurately previews all three initiatives described.
      Choice A is too broad. Choice C focuses only on bike lanes. Choice D focuses on
      only one initiative and makes a comparative claim the paragraph does not support.

  - number: 18
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Read the passage below. Which revision best corrects the verb tense error?

      "Last summer, Priya [visits] her grandparents in India for the first time. She was
      overwhelmed by the heat but quickly adjusted. By the end of the trip, she had fallen
      in love with the food and the culture."
    choices:
      A: "Last summer, Priya will visit her grandparents in India for the first time."
      B: "Last summer, Priya visited her grandparents in India for the first time."
      C: "Last summer, Priya has visited her grandparents in India for the first time."
      D: "No revision needed."
    answer: B
    explanation: |
      "Last summer" signals past tense. The verb "visits" (present tense) is inconsistent
      with both the time marker and the other verbs in the passage ("was," "adjusted,"
      "had fallen"). Choice B corrects it to "visited" (simple past), matching the rest
      of the passage.

  - number: 19
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Read the sentence below. Which revision best eliminates the ambiguous pronoun reference?

      "After the coach spoke with James and David, he told him to stay after practice."
    choices:
      A: "After the coach spoke with James and David, he told them to stay after practice."
      B: "After speaking with James and David, the coach told James to stay after practice."
      C: "He told him to stay after practice after the coach spoke with James and David."
      D: "After the coach spoke with James and David, the coach told James and David to stay."
    answer: B
    explanation: |
      The original is ambiguous because "he" and "him" could refer to either James, David,
      or the coach. Choice B removes ambiguity by naming the subject ("the coach") and
      specifying who was told to stay ("James"). Choice A replaces "him" with "them" but
      still leaves "he" ambiguous.

  - number: 20
    type: multiple_choice
    topic: Revising/Editing
    difficulty: medium
    question: |
      Read the sentence below. Which revision is the most concise?

      "Due to the fact that the roads were icy, the school district made the decision to cancel classes."
    choices:
      A: "Because the roads were icy, the school district cancelled classes."
      B: "The roads were icy, and due to this fact, the decision was made to cancel classes."
      C: "The school district cancelled classes on account of the icy road conditions that existed."
      D: "Because of the fact that roads were icy, the school district decided to cancel classes."
    answer: A
    explanation: |
      "Due to the fact that" is wordy and should be replaced with "Because." Similarly,
      "made the decision to cancel" is wordier than "cancelled." Choice A is the most
      concise revision: "Because the roads were icy, the school district cancelled classes."

