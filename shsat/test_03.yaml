      her piece for three weeks: a mixed-media collage about their grandmother's journey
      from Nigeria, assembled from fabric swatches, dried flowers, old photographs, and
      hand-lettered captions in both English and Igbo.

      The judges announced their decision on a Friday afternoon. First prize: Adaeze.

      Celine stood very still when she heard it. She was not crying, but her face had
      gone a particular kind of blank — the blankness of someone recalculating everything
      they thought they knew. She walked over to her sister's collage and stood in front
      of it for a long time.

      It was not just a picture. It was a world — layered, textured, full of decisions
      that asked you to look more than once. Every element had been chosen. Every caption
