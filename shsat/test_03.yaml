  - number: 50
    type: multiple_choice
    topic: Number Theory
    difficulty: hard
    question: |
      When a positive integer n is divided by 7, the remainder is 4. When 3n is divided
      by 7, what is the remainder?
    choices:
      A: "3"
      B: "5"
      C: "6"
      D: "12"
    answer: B
    explanation: |
      Since n divided by 7 gives remainder 4, write n = 7k + 4 for some integer k.
      Then 3n = 3(7k + 4) = 21k + 12.
      21k is divisible by 7. Find the remainder of 12 / 7: 12 = 7(1) + 5.
      So 3n divided by 7 has remainder 5.
      Verify with n = 4: 3(4) = 12; 12 / 7 = 1 remainder 5. Correct.

  - number: 51
    type: multiple_choice
    topic: Sequences
    difficulty: hard
    question: |
      The first term of a sequence is 3. Each term after the first is 5 more than twice
      the previous term. What is the 4th term of the sequence?
    choices:
      A: "51"
      B: "59"
      C: "65"
      D: "71"
    answer: B
    explanation: |
      Term 1 = 3.
      Term 2 = 2(3) + 5 = 11.
      Term 3 = 2(11) + 5 = 27.
      Term 4 = 2(27) + 5 = 59.

