  # ----------------------------------------------------------------
  # PASSAGE 1: Fiction — Marcus and Coach Rivera (Q21–27)
  # ----------------------------------------------------------------

  - number: 21
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: medium
    passage_id: passage_ela_3_1
    passage_title: "Racing the Track"
    passage_text: |
      Marcus had been the fastest eighth-grader at Jefferson Middle School — until the
      injury. A torn ligament in his left knee had kept him off the track for seven months,
      and when he finally returned to practice, nothing felt right. His legs felt heavy.
      His lungs burned after half a lap. Worst of all, every time he rounded a corner, he
      checked the stopwatch on his wrist, and the numbers were always wrong.

      Coach Rivera watched him for two weeks before she said anything. Then one afternoon,
      after the rest of the team had gone home, she sat next to him on the bleachers.

      "You're racing your old self," she said. "And your old self isn't here anymore."

      Marcus stared at the track. "So I'm just supposed to give up?"

      "No," said Coach Rivera. "You're supposed to race the track. Not a memory. Not a
      number. Just the four hundred meters in front of you."

      He didn't understand at first. But the next day, he left his stopwatch in his bag.
      He ran the first lap without looking at anything except the red line of the lane ahead.
      His lungs still burned. His knee ached. But somewhere in the back stretch, something
      shifted. He wasn't trailing a ghost anymore. He was just running.

      By the end of the month, his times had not returned to where they once were. But he
      had stopped dreading practice. He had stopped flinching when he rounded the corner.
      And Coach Rivera — who had watched hundreds of athletes recover from setbacks — said
      quietly to herself that this was always the hardest part: not the injury, but the
      moment a young athlete chose to stop measuring themselves against the person they
      used to be.
    question: |
      Which of the following best describes Marcus's primary motivation at the beginning
      of the passage?
    choices:
      A: "To impress Coach Rivera with his athletic dedication"
      B: "To return to his pre-injury level of performance as quickly as possible"
      C: "To accept that he will never be as fast as he once was"
      D: "To compete against his teammates for the fastest time"
    answer: B
    explanation: |
      At the beginning of the passage, Marcus checks his stopwatch constantly and is
      upset that "the numbers were always wrong." Coach Rivera confirms this when she
      says, "You're racing your old self." His primary motivation is to recapture his
      previous speed. He has not yet given up (C), and there is no mention of competing
      with teammates (D) or impressing the coach (A).

  - number: 22
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: medium
    passage_id: passage_ela_3_1
    question: |
      Based on the passage, which of the following can be inferred about Coach Rivera?
    choices:
      A: "She was frustrated with Marcus for not recovering faster."
      B: "She believed Marcus needed to work harder in practice."
      C: "She understood that psychological recovery is as important as physical recovery."
      D: "She thought Marcus should switch to a different sport."
    answer: C
    explanation: |
      Coach Rivera waits two weeks before intervening and then addresses Marcus's mental
      state, not his physical technique. Her final observation — that the hardest part is
      "the moment a young athlete chose to stop measuring themselves against the person
      they used to be" — confirms she sees the psychological challenge as the critical
      obstacle. There is no evidence she was frustrated or thought he should switch sports.

  - number: 23
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: easy
    passage_id: passage_ela_3_1
    question: |
      As it is used in paragraph 7, the word "flinching" most nearly means:
    choices:
      A: "accelerating suddenly"
      B: "recoiling from anticipated pain or fear"
      C: "stopping to rest"
      D: "looking backward"
    answer: B
    explanation: |
      "Flinching" means pulling back or recoiling from something feared or painful. In
      context, Marcus had been dreading the corners of the track — they reminded him of
      his injury and his slower times. By the end of the month, he had stopped recoiling
      from that anticipated disappointment.

  - number: 24
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: medium
    passage_id: passage_ela_3_1
    question: |
      As it is used in paragraph 6, the phrase "trailing a ghost" most nearly means:
    choices:
      A: "running alone in an empty stadium"
      B: "being haunted by a frightening memory"
      C: "trying to keep pace with his former self"
      D: "falling behind his teammates during a race"
    answer: C
    explanation: |
      In context, Marcus has just left his stopwatch behind and stopped comparing himself
      to his old times. "He wasn't trailing a ghost anymore" means he was no longer trying
      to catch up to an image of himself that no longer existed — his pre-injury self.
      The "ghost" is a metaphor for that former version of Marcus.

  - number: 25
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: hard
    passage_id: passage_ela_3_1
    question: |
      What is the most likely theme of this passage?
    choices:
      A: "Physical talent is more important than mental toughness in athletic recovery."
      B: "Injuries are best overcome by tracking performance data carefully."
      C: "True progress requires releasing the pressure of past achievements."
      D: "A good coach is more valuable than any amount of personal effort."
    answer: C
    explanation: |
      The central message — illustrated by Coach Rivera's advice and Marcus's gradual
      shift — is that Marcus cannot move forward while measuring himself against who he
      used to be. Once he stops comparing, something positive shifts. Choice A is
      contradicted by the passage's emphasis on mental recovery. Choice B is the opposite
      of what works for Marcus — he improves after abandoning his stopwatch.

  - number: 26
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: hard
    passage_id: passage_ela_3_1
    question: |
      Which sentence from the passage best supports the idea that Marcus's mental state
      was holding back his recovery more than his physical condition?
    choices:
      A: "A torn ligament in his left knee had kept him off the track for seven months."
      B: "His legs felt heavy. His lungs burned after half a lap."
      C: "Every time he rounded a corner, he checked the stopwatch on his wrist, and the numbers were always wrong."
      D: "By the end of the month, his times had not returned to where they once were."
    answer: C
    explanation: |
      The detail about constantly checking his stopwatch — and being distressed by the
      results — demonstrates that Marcus's mental habit of comparing himself to the past
      was the source of his frustration. Choice A describes the physical injury itself.
      Choice B describes physical symptoms only. Choice D shows his times were still
      slower even after his attitude improved, which does not specifically isolate mental
      block as the cause.

  - number: 27
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: medium
    passage_id: passage_ela_3_1
    question: |
      How does the structure of the passage contribute to its meaning?
    choices:
      A: "By beginning with Marcus's injury and ending with his championship win, the passage shows the reward of persistence."
      B: "By alternating between the present and the past, the passage shows how memories can distort reality."
      C: "By moving from Marcus's frustration through Coach Rivera's advice to a gradual shift in his outlook, the passage traces an emotional journey."
      D: "By using multiple points of view, the passage allows the reader to understand both coach and athlete equally."
    answer: C
    explanation: |
      The passage follows a clear emotional arc: Marcus's post-injury frustration, Coach
      Rivera's intervention, and Marcus's gradual psychological shift. The resolution is
      not a championship but a change in attitude. Choice A is wrong — Marcus does not
      win a championship. Choice B is wrong — the passage does not alternate timelines.
      Choice D is wrong — Rivera's perspective appears only briefly at the very end.

  # ----------------------------------------------------------------
  # PASSAGE 2: Nonfiction/Science — How Sound Works (Q28–34)
  # ----------------------------------------------------------------

  - number: 28
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: easy
    passage_id: passage_ela_3_2
    passage_title: "The Science of Sound"
    passage_text: |
      Sound begins with vibration. When an object vibrates — a guitar string, a drum
      membrane, or even a person's vocal cords — it pushes the air around it back and
      forth, creating waves of pressure. These pressure waves travel outward in all
      directions until they reach your ears, where tiny structures convert them into
      signals that your brain interprets as sound.

      The speed at which an object vibrates is called its frequency, measured in hertz
      (Hz). One hertz equals one vibration per second. High-frequency vibrations produce
      high-pitched sounds; low-frequency vibrations produce low-pitched sounds. Humans
      can typically hear sounds between 20 Hz and 20,000 Hz. Dogs can hear much higher
      frequencies — up to 65,000 Hz — which is why dog whistles, inaudible to humans,
      are perfectly clear to dogs.

      The loudness of a sound is determined not by its frequency but by the amplitude of
      the wave — the size of the pressure change. A large amplitude means a loud sound; a
      small amplitude means a quiet one. Loudness is measured in decibels (dB). A whisper
      registers around 30 dB, a normal conversation around 60 dB, and a rock concert can
      reach 110 dB or more. Prolonged exposure to sounds above 85 dB can cause permanent
      hearing loss.

      Different instruments produce different tones even when playing the same note
      because of a quality called timbre (pronounced "TAM-ber"). When a violin and a
      flute both play an A note at 440 Hz, you can still tell them apart. This is because
      each instrument produces not just the main frequency but also a series of higher
      frequencies called overtones. The specific blend of overtones gives each instrument
      its unique sound quality — its timbre.

      Understanding sound as a physical phenomenon — waves of pressure moving through a
      medium — also explains why there is no sound in space. Space is a near-perfect
      vacuum: there is no air, and therefore no medium for sound waves to travel through.
      The explosive destruction of a star would be completely silent to any observer
      floating nearby.
    question: |
      According to the passage, what causes a sound to be high-pitched rather than low-pitched?
    choices:
      A: "A greater amplitude of the sound wave"
      B: "A higher frequency of vibration"
      C: "A louder volume measured in decibels"
      D: "A greater number of overtones produced"
    answer: B
    explanation: |
      The passage states directly: "High-frequency vibrations produce high-pitched sounds;
      low-frequency vibrations produce low-pitched sounds." Amplitude determines loudness
      (A and C), not pitch. Overtones determine timbre (D), not pitch.

  - number: 29
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: easy
    passage_id: passage_ela_3_2
    question: |
      As it is used in paragraph 4, the word "timbre" most nearly means:
    choices:
      A: "the volume at which an instrument plays"
      B: "the pitch of the main note an instrument produces"
      C: "the unique sound quality that distinguishes one instrument from another"
      D: "the speed at which sound travels through the air"
    answer: C
