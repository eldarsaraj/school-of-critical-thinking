      On July 19–20, 1848, approximately three hundred people gathered at a small
      Methodist church in Seneca Falls, New York, for the first women's rights convention
      in American history. Organized primarily by Elizabeth Cady Stanton and Lucretia
      Mott, the convention produced a document modeled on the Declaration of Independence:
      the Declaration of Sentiments. It opened with a bold revision of the founding
      document: "We hold these truths to be self-evident: that all men and women are
      created equal." Among the document's resolutions was a call for women's suffrage —
      the right to vote. Even some of the convention's own organizers considered this
      demand too radical.

      Over the following decades, the suffragette movement grew. Susan B. Anthony, who
      became one of its most prominent leaders, was arrested in 1872 for voting
      illegally in a presidential election. She was found guilty and fined — but she
      never paid the fine. Anthony and Stanton co-founded the National Woman Suffrage
      Association (NWSA) in 1869, which focused on winning voting rights through a
      constitutional amendment.

      The movement was not monolithic. While Anthony and Stanton focused on a national
      strategy, other activists pushed for state-by-state victories. Wyoming granted
      women the right to vote in 1869, the first territory or state to do so. By 1900,
      several western states had followed. Meanwhile, the national amendment remained
      stalled in Congress for decades.

      The suffragette movement also had significant internal divisions along racial lines.
      Ida B. Wells, a Black journalist and activist, fought for suffrage while also
      leading an anti-lynching campaign. She and other Black women suffragists found
      that the mainstream movement sometimes excluded or sidelined them, particularly in
      the South, where organizers feared that including Black women would alienate white
      Southern voters.

      On August 18, 1920, the Nineteenth Amendment was ratified, granting women the
      right to vote. It had taken seventy-two years — from Seneca Falls to ratification.
      Yet for many Black women in the South, practical access to the ballot would remain
      blocked by discriminatory laws until the Voting Rights Act of 1965.
    question: |
