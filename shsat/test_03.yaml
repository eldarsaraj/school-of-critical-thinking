      D: "The arrest of Susan B. Anthony for illegal voting"
    answer: B
    explanation: |
      The passage states clearly: "approximately three hundred people gathered ... for
      the first women's rights convention in American history." The NWSA was founded in
      1869 (A), the Nineteenth Amendment was ratified in 1920 (C), and Anthony's arrest
      was in 1872 (D).

