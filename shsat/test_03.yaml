      Adaeze's collage is described as being "about their grandmother's journey from
      Nigeria," using photographs, fabric, flowers, and handwritten captions. The caption
      "She carried this from Lagos" confirms personal, memorial intention. The passage
      offers no evidence of resentment (A), self-doubt about her work (B), or a history
      of entering competitions (D).

  - number: 57
    type: multiple_choice
    topic: Reading Comprehension
    difficulty: hard
    passage_id: passage_ela_3_5
    question: |
      In the final paragraph, Celine draws their grandmother's hands "three times before
      she felt she had them right." What does this action most likely suggest about her
      character at this point in the story?
    choices:
      A: "She has become frustrated with her sister's success and is trying to copy her style."
      B: "She has begun to adopt the same kind of intentional, feeling-driven approach to art that made Adaeze's work meaningful."
      C: "She is practicing her technical skills so she can do better in the next competition."
      D: "She is drawing from memory because she cannot find a photograph of her grandmother."
    answer: B
    explanation: |
      Drawing "from memory" and "from feeling" — and revising until it feels right —
      mirrors the intentional, emotionally invested approach that made Adaeze's work
      meaningful. This is a direct shift from Celine's earlier habit of drawing whatever
      was in front of her with technical ease. The passage frames this as a change in
      how she understands art, not merely technical practice (C) or imitation (A).

math:

  # ================================================================
  # MATH — Questions 1–52: Multiple Choice
  # ================================================================

  # ----------------------------------------------------------------
  # Q1–5: Number Properties
  # ----------------------------------------------------------------

  - number: 1
    type: multiple_choice
    topic: Number Properties
    difficulty: easy
    question: |
      How many positive factors does 36 have?
    choices:
      A: "7"
      B: "8"
      C: "9"
      D: "10"
    answer: C
    explanation: |
      The factors of 36 are: 1, 2, 3, 4, 6, 9, 12, 18, 36. That is 9 factors.
      Using the formula: 36 = 2^2 x 3^2, so the number of factors = (2+1)(2+1) = 9.

  - number: 2
    type: multiple_choice
    topic: Number Properties
    difficulty: easy
    question: |
      What is the least common multiple (LCM) of 8 and 12?
    choices:
      A: "16"
      B: "20"
      C: "24"
      D: "48"
    answer: C
    explanation: |
      Multiples of 8: 8, 16, 24 ...
      Multiples of 12: 12, 24 ...
      The smallest number in both lists is 24.
      Using the formula: LCM(8,12) = 8 x 12 / GCF(8,12) = 96 / 4 = 24.

  - number: 3
    type: multiple_choice
    topic: Number Properties
    difficulty: easy
    question: |
      How many prime numbers are there between 20 and 30 (not including 20 or 30)?
    choices:
      A: "1"
      B: "2"
      C: "3"
      D: "4"
    answer: B
    explanation: |
      Check each number: 21 = 3x7, 22 = 2x11, 23 (prime), 24 = 2x12, 25 = 5x5,
      26 = 2x13, 27 = 3x9, 28 = 4x7, 29 (prime).
      The primes are 23 and 29 — that is 2 prime numbers.

  - number: 4
    type: multiple_choice
    topic: Number Properties
    difficulty: easy
    question: |
      Which of the following numbers is divisible by 9?
    choices:
      A: "124"
      B: "135"
      C: "146"
      D: "152"
    answer: B
    explanation: |
      A number is divisible by 9 if the sum of its digits is divisible by 9.
      124: 1+2+4 = 7. Not divisible.
      135: 1+3+5 = 9. Divisible by 9.
      146: 1+4+6 = 11. Not divisible.
      152: 1+5+2 = 8. Not divisible.

  - number: 5
    type: multiple_choice
    topic: Number Properties
    difficulty: easy
    question: |
      What is the greatest common factor (GCF) of 48 and 36?
    choices:
      A: "6"
      B: "8"
      C: "12"
      D: "18"
    answer: C
    explanation: |
      48 = 2^4 x 3 and 36 = 2^2 x 3^2.
      GCF = 2^2 x 3 = 4 x 3 = 12.
      Check: 48 / 12 = 4 and 36 / 12 = 3. Both are integers, confirming 12 is the GCF.

  # ----------------------------------------------------------------
  # Q6–10: Fractions and Mixed Numbers
  # ----------------------------------------------------------------

  - number: 6
    type: multiple_choice
    topic: Fractions
    difficulty: easy
    question: |
      What is 3/4 + 5/6?
    choices:
      A: "8/10"
      B: "1 5/12"
      C: "1 7/12"
      D: "2 1/12"
    answer: C
    explanation: |
      Find a common denominator: LCD(4, 6) = 12.
      3/4 = 9/12 and 5/6 = 10/12.
      9/12 + 10/12 = 19/12 = 1 7/12.

  - number: 7
    type: multiple_choice
    topic: Fractions
    difficulty: medium
    question: |
      What is 2 1/3 - 1 3/4?
    choices:
      A: "7/12"
      B: "1/2"
      C: "2/3"
      D: "1 1/12"
    answer: A
    explanation: |
      Convert to improper fractions: 2 1/3 = 7/3 and 1 3/4 = 7/4.
      LCD(3, 4) = 12.
      7/3 = 28/12 and 7/4 = 21/12.
      28/12 - 21/12 = 7/12.

  - number: 8
    type: multiple_choice
    topic: Fractions
    difficulty: easy
    question: |
      What is 3/5 x 10/9?
    choices:
      A: "1/3"
      B: "1/2"
      C: "2/3"
      D: "6/5"
    answer: C
    explanation: |
      3/5 x 10/9 = (3 x 10) / (5 x 9) = 30/45 = 2/3.
      Cross-cancel shortcut: 3 and 9 share a factor of 3, and 10 and 5 share a factor
      of 5, giving (1 x 2) / (1 x 3) = 2/3.

  - number: 9
    type: multiple_choice
    topic: Fractions
    difficulty: medium
    question: |
      What is 5/8 divided by 15/16?
    choices:
      A: "1/2"
      B: "2/3"
      C: "3/4"
      D: "4/3"
    answer: B
    explanation: |
      Dividing by a fraction means multiplying by its reciprocal.
      5/8 / (15/16) = 5/8 x 16/15 = (5 x 16) / (8 x 15) = 80/120 = 2/3.

  - number: 10
    type: multiple_choice
    topic: Fractions
    difficulty: medium
    question: |
      What is 1 2/5 x 2 1/2?
    choices:
      A: "2 1/2"
      B: "3"
      C: "3 1/2"
      D: "4"
    answer: C
    explanation: |
      Convert to improper fractions: 1 2/5 = 7/5 and 2 1/2 = 5/2.
      7/5 x 5/2 = 35/10 = 7/2 = 3 1/2.
      The fives cancel: 7/1 x 1/2 = 7/2 = 3 1/2.

  # ----------------------------------------------------------------
  # Q11–15: Percent Problems
  # ----------------------------------------------------------------

  - number: 11
    type: multiple_choice
    topic: Percents
    difficulty: easy
    question: |
      What is 35% of 80?
    choices:
      A: "24"
      B: "26"
      C: "28"
      D: "32"
    answer: C
    explanation: |
      35% of 80 = 0.35 x 80 = 28.
      Alternative: 10% of 80 = 8, so 30% = 24 and 5% = 4. Total = 24 + 4 = 28.

  - number: 12
    type: multiple_choice
    topic: Percents
    difficulty: medium
    question: |
      A jacket originally cost $75. It now costs $90. What is the percent increase?
    choices:
      A: "15%"
      B: "17%"
      C: "20%"
      D: "25%"
    answer: C
    explanation: |
      Percent change = (new - old) / old x 100 = (90 - 75) / 75 x 100 = 15/75 x 100 = 20%.

  - number: 13
    type: multiple_choice
    topic: Percents
    difficulty: medium
    question: |
      After a 20% discount, a pair of shoes costs $56. What was the original price?
    choices:
      A: "$62"
      B: "$67.20"
      C: "$70"
      D: "$72"
    answer: C
    explanation: |
      A 20% discount means the customer pays 80% of the original price.
      0.80 x p = 56, so p = 56 / 0.80 = $70.

  - number: 14
    type: multiple_choice
    topic: Percents
    difficulty: medium
    question: |
      15% of a number is 9. What is the number?
    choices:
      A: "45"
      B: "54"
      C: "60"
      D: "75"
    answer: C
    explanation: |
      0.15 x n = 9, so n = 9 / 0.15 = 60.
      Check: 15% of 60 = 0.15 x 60 = 9. Correct.

  - number: 15
    type: multiple_choice
    topic: Percents
    difficulty: hard
    question: |
      A store increases a price by 20%, then decreases the new price by 10%.
      What is the overall percent change from the original price?
    choices:
      A: "10% increase"
      B: "8% increase"
      C: "2% decrease"
      D: "No change"
    answer: B
    explanation: |
      Start with $100.
      After 20% increase: $100 x 1.20 = $120.
      After 10% decrease: $120 x 0.90 = $108.
      Net change: $8 increase on a $100 original = 8% overall increase.

  # ----------------------------------------------------------------
  # Q16–20: Algebra — Solving Equations
  # ----------------------------------------------------------------

  - number: 16
    type: multiple_choice
    topic: Algebra
    difficulty: medium
    question: |
      Solve for x: 3x + 7 = x + 19
    choices:
      A: "4"
      B: "6"
      C: "8"
      D: "12"
    answer: B
    explanation: |
      3x + 7 = x + 19
      3x - x = 19 - 7
      2x = 12
      x = 6.
      Check: 3(6) + 7 = 25 and 6 + 19 = 25. Correct.

  - number: 17
    type: multiple_choice
    topic: Algebra
    difficulty: medium
    question: |
      Solve for x: 4(x - 3) = 2x + 6
    choices:
      A: "6"
      B: "7"
      C: "9"
      D: "12"
    answer: C
    explanation: |
      4(x - 3) = 2x + 6
      4x - 12 = 2x + 6
      2x = 18
      x = 9.
      Check: 4(9-3) = 4(6) = 24 and 2(9)+6 = 24. Correct.

  - number: 18
    type: multiple_choice
    topic: Algebra
    difficulty: medium
    question: |
      Solve for x: 5x - 2 = 3x + 10
    choices:
      A: "4"
      B: "6"
      C: "7"
      D: "8"
    answer: B
    explanation: |
      5x - 2 = 3x + 10
      5x - 3x = 10 + 2
      2x = 12
      x = 6.
      Check: 5(6) - 2 = 28 and 3(6) + 10 = 28. Correct.

  - number: 19
    type: multiple_choice
    topic: Algebra
    difficulty: medium
    question: |
      Solve for x: 2(3x + 1) = 5x + 8
    choices:
      A: "5"
      B: "6"
      C: "7"
      D: "8"
    answer: B
    explanation: |
      2(3x + 1) = 5x + 8
      6x + 2 = 5x + 8
      x = 6.
      Check: 2(3(6)+1) = 2(19) = 38 and 5(6)+8 = 38. Correct.

  - number: 20
    type: multiple_choice
    topic: Algebra
    difficulty: medium
    question: |
      Solve for x: x/3 + 5 = 11
    choices:
      A: "12"
      B: "15"
      C: "18"
      D: "21"
    answer: C
    explanation: |
      x/3 + 5 = 11
      x/3 = 6
      x = 18.
      Check: 18/3 + 5 = 6 + 5 = 11. Correct.

  # ----------------------------------------------------------------
  # Q21–25: Algebra — Word Problems and Systems
  # ----------------------------------------------------------------

  - number: 21
    type: multiple_choice
    topic: Algebra
    difficulty: medium
    question: |
      Twice a number decreased by 7 is equal to 15. What is the number?
    choices:
      A: "8"
      B: "9"
      C: "11"
      D: "14"
    answer: C
    explanation: |
      Let n = the number. 2n - 7 = 15, so 2n = 22, and n = 11.
      Check: 2(11) - 7 = 22 - 7 = 15. Correct.

  - number: 22
    type: multiple_choice
    topic: Algebra
    difficulty: medium
    question: |
      Two numbers have a sum of 20 and a difference of 6. What is the larger number?
    choices:
      A: "11"
      B: "12"
      C: "13"
      D: "14"
    answer: C
    explanation: |
      Let x = larger and y = smaller. x + y = 20 and x - y = 6.
      Adding both equations: 2x = 26, so x = 13.
      Then y = 20 - 13 = 7.
      Check: 13 + 7 = 20 and 13 - 7 = 6. Correct.

  - number: 23
    type: multiple_choice
    topic: Algebra
    difficulty: medium
    question: |
      Three times one number plus twice another number equals 24.
      The first number is 3 more than the second. What is the first number?
    choices:
      A: "5"
      B: "6"
      C: "8"
      D: "9"
    answer: B
    explanation: |
      Let the second number = y, so the first number = y + 3.
      3(y + 3) + 2y = 24
      3y + 9 + 2y = 24
      5y = 15, so y = 3.
      First number = 3 + 3 = 6.
      Check: 3(6) + 2(3) = 18 + 6 = 24. Correct.

  - number: 24
    type: multiple_choice
    topic: Algebra
    difficulty: medium
    question: |
      Maria is 4 years older than twice Jake's current age. In 3 years, Maria will be
      25 years old. How old is Jake now?
    choices:
      A: "7"
      B: "8"
      C: "9"
      D: "10"
    answer: C
    explanation: |
      If Maria will be 25 in 3 years, Maria is currently 25 - 3 = 22.
      22 = 2 x (Jake's age) + 4
      18 = 2 x (Jake's age)
      Jake's age = 9.
      Check: 2(9) + 4 = 22. Correct.

  - number: 25
    type: multiple_choice
    topic: Algebra
    difficulty: hard
    question: |
      Solve the system of equations: 2x + 3y = 16 and x + y = 7. What is the value of x?
    choices:
      A: "3"
      B: "4"
      C: "5"
      D: "6"
    answer: C
    explanation: |
      From x + y = 7: x = 7 - y.
      Substitute into 2x + 3y = 16:
      2(7 - y) + 3y = 16
      14 - 2y + 3y = 16
      y = 2, so x = 7 - 2 = 5.
      Check: 2(5) + 3(2) = 10 + 6 = 16. Correct.

  # ----------------------------------------------------------------
  # Q26–30: Geometry — Angle Relationships
  # ----------------------------------------------------------------

  - number: 26
    type: multiple_choice
    topic: Geometry
    difficulty: easy
    question: |
      Two lines intersect, forming vertical angles. One angle measures 65 degrees.
      What is the measure of the vertical angle across from it?
    choices:
      A: "25 degrees"
      B: "35 degrees"
      C: "65 degrees"
      D: "115 degrees"
    answer: C
    explanation: |
      Vertical angles are always equal. If one angle is 65 degrees, its vertical angle
      (directly across the intersection) also measures 65 degrees.

  - number: 27
    type: multiple_choice
    topic: Geometry
    difficulty: easy
    question: |
      Two angles are supplementary. One angle measures 112 degrees.
      What is the measure of the other angle?
    choices:
      A: "58 degrees"
      B: "68 degrees"
      C: "72 degrees"
      D: "78 degrees"
    answer: B
    explanation: |
      Supplementary angles sum to 180 degrees.
      180 - 112 = 68 degrees.

  - number: 28
    type: multiple_choice
    topic: Geometry
    difficulty: easy
    question: |
      A triangle has angles measuring 40 degrees and 75 degrees.
      What is the measure of the third angle?
    choices:
      A: "55 degrees"
      B: "60 degrees"
      C: "65 degrees"
      D: "75 degrees"
    answer: C
    explanation: |
      The angles of a triangle sum to 180 degrees.
      180 - 40 - 75 = 65 degrees.

  - number: 29
    type: multiple_choice
    topic: Geometry
    difficulty: medium
    question: |
      An exterior angle of a triangle measures 130 degrees. One of the two non-adjacent
      interior angles measures 55 degrees. What is the measure of the other non-adjacent
      interior angle?
    choices:
      A: "50 degrees"
      B: "65 degrees"
      C: "75 degrees"
      D: "80 degrees"
    answer: C
    explanation: |
      The Exterior Angle Theorem states that an exterior angle of a triangle equals the
      sum of the two non-adjacent interior angles.
      130 = 55 + x, so x = 75 degrees.

  - number: 30
    type: multiple_choice
    topic: Geometry
    difficulty: easy
    question: |
      Two angles are complementary. One angle measures 37 degrees.
      What is the measure of the other angle?
    choices:
      A: "43 degrees"
      B: "53 degrees"
      C: "63 degrees"
      D: "143 degrees"
    answer: B
    explanation: |
      Complementary angles sum to 90 degrees.
      90 - 37 = 53 degrees.

  # ----------------------------------------------------------------
  # Q31–35: Geometry — Area and Perimeter
  # ----------------------------------------------------------------

  - number: 31
    type: multiple_choice
    topic: Geometry
    difficulty: easy
    question: |
      A triangle has a base of 14 cm and a height of 9 cm. What is its area?
    choices:
      A: "46 sq cm"
      B: "54 sq cm"
      C: "63 sq cm"
      D: "126 sq cm"
    answer: C
    explanation: |
      Area of a triangle = (1/2) x base x height = (1/2) x 14 x 9 = 63 sq cm.

  - number: 32
    type: multiple_choice
    topic: Geometry
    difficulty: easy
    question: |
      A right triangle has legs of 8 m and 15 m. What is the perimeter of the triangle?
    choices:
      A: "30 m"
      B: "36 m"
      C: "40 m"
      D: "46 m"
    answer: C
    explanation: |
      Find the hypotenuse: sqrt(8^2 + 15^2) = sqrt(64 + 225) = sqrt(289) = 17 m.
      Perimeter = 8 + 15 + 17 = 40 m.

  - number: 33
    type: multiple_choice
    topic: Geometry
    difficulty: medium
    question: |
      A trapezoid has parallel bases of 10 cm and 16 cm and a height of 8 cm.
      What is the area of the trapezoid?
    choices:
      A: "96 sq cm"
      B: "100 sq cm"
      C: "104 sq cm"
      D: "112 sq cm"
    answer: C
    explanation: |
      Area of trapezoid = (1/2) x (b1 + b2) x h = (1/2) x (10 + 16) x 8
      = (1/2) x 26 x 8 = 104 sq cm.

  - number: 34
    type: multiple_choice
    topic: Geometry
    difficulty: medium
    question: |
      A composite figure consists of a rectangle 10 m long and 6 m wide, with a right
      triangle cut out from one corner. The triangle has legs of 4 m and 3 m.
      What is the area of the remaining figure?
    choices:
      A: "50 sq m"
      B: "54 sq m"
      C: "56 sq m"
      D: "60 sq m"
    answer: B
    explanation: |
      Area of rectangle = 10 x 6 = 60 sq m.
      Area of triangle removed = (1/2) x 4 x 3 = 6 sq m.
      Remaining area = 60 - 6 = 54 sq m.

  - number: 35
    type: multiple_choice
    topic: Geometry
    difficulty: medium
    question: |
      A trapezoid has four sides measuring 10 cm, 9 cm, 16 cm, and 7 cm.
      What is its perimeter?
    choices:
      A: "38 cm"
      B: "40 cm"
      C: "42 cm"
      D: "44 cm"
    answer: C
    explanation: |
      Perimeter = sum of all four sides = 10 + 9 + 16 + 7 = 42 cm.

  # ----------------------------------------------------------------
  # Q36–38: Geometry — Circles, Cylinders, Coordinates
  # ----------------------------------------------------------------

  - number: 36
    type: multiple_choice
    topic: Geometry
    difficulty: medium
    question: |
      A circle has a radius of 7 cm. Which of the following correctly expresses its area?
    choices:
      A: "14pi sq cm"
      B: "49pi sq cm"
      C: "98pi sq cm"
      D: "196pi sq cm"
    answer: B
    explanation: |
      Area = pi x r^2 = pi x 7^2 = 49pi sq cm.
      Using pi approximately equal to 3.14 gives approximately 153.86 sq cm.

  - number: 37
    type: multiple_choice
    topic: Geometry
    difficulty: medium
    question: |
      A circle has a diameter of 10 cm. Which of the following correctly expresses
      its circumference?
    choices:
      A: "5pi cm"
      B: "10pi cm"
      C: "20pi cm"
      D: "100pi cm"
    answer: B
    explanation: |
      Circumference = pi x diameter = pi x 10 = 10pi cm.
      Using pi approximately equal to 3.14 gives approximately 31.4 cm.

  - number: 38
    type: multiple_choice
    topic: Geometry
    difficulty: medium
    question: |
      What is the distance between the points (1, 2) and (4, 6) on a coordinate plane?
    choices:
      A: "4"
      B: "5"
      C: "6"
      D: "7"
    answer: B
    explanation: |
      Distance = sqrt((x2 - x1)^2 + (y2 - y1)^2)
      = sqrt((4-1)^2 + (6-2)^2)
      = sqrt(3^2 + 4^2)
      = sqrt(9 + 16)
      = sqrt(25) = 5.

  # ----------------------------------------------------------------
  # Q39–43: Statistics and Probability
  # ----------------------------------------------------------------

  - number: 39
    type: multiple_choice
    topic: Statistics
    difficulty: easy
    question: |
      What is the mean of the data set {4, 7, 8, 9, 12}?
    choices:
      A: "7"
      B: "8"
      C: "9"
      D: "10"
    answer: B
    explanation: |
      Mean = sum / count = (4 + 7 + 8 + 9 + 12) / 5 = 40 / 5 = 8.

  - number: 40
    type: multiple_choice
    topic: Statistics
    difficulty: easy
    question: |
      What is the median of the data set {3, 5, 7, 9, 11}?
    choices:
      A: "5"
      B: "6"
      C: "7"
      D: "9"
    answer: C
    explanation: |
      The data set is already in order: 3, 5, 7, 9, 11. With 5 values, the median is
      the 3rd value, which is 7.

  - number: 41
    type: multiple_choice
    topic: Statistics
    difficulty: easy
    question: |
      What is the range of the data set {12, 5, 18, 3, 9}?
    choices:
      A: "13"
      B: "14"
      C: "15"
      D: "16"
    answer: C
    explanation: |
      Range = maximum - minimum = 18 - 3 = 15.

  - number: 42
    type: multiple_choice
    topic: Statistics
    difficulty: medium
    question: |
      The mean of five numbers is 10. Four of the numbers are 8, 12, 9, and 7.
      What is the fifth number?
    choices:
      A: "12"
      B: "13"
      C: "14"
      D: "15"
    answer: C
    explanation: |
      Sum of all 5 numbers = mean x count = 10 x 5 = 50.
      Sum of known four = 8 + 12 + 9 + 7 = 36.
      Fifth number = 50 - 36 = 14.

  - number: 43
    type: multiple_choice
    topic: Statistics
    difficulty: medium
    question: |
      A bag contains 4 red marbles, 5 blue marbles, and 3 green marbles. One marble is
      chosen at random. What is the probability that it is NOT blue?
    choices:
      A: "5/12"
      B: "7/12"
      C: "5/7"
      D: "7/9"
    answer: B
    explanation: |
      Total marbles = 4 + 5 + 3 = 12.
      Non-blue marbles = 4 + 3 = 7.
      P(not blue) = 7/12.

  # ----------------------------------------------------------------
  # Q44–49: Word Problems — Ratio, Rate, Mixture, Work
  # ----------------------------------------------------------------

  - number: 44
    type: multiple_choice
    topic: Ratios and Rates
    difficulty: medium
    question: |
      The ratio of boys to girls in a class is 3:5. If there are 40 students total,
      how many are boys?
    choices:
      A: "12"
      B: "15"
      C: "20"
      D: "24"
    answer: B
    explanation: |
      Total parts = 3 + 5 = 8. Each part = 40 / 8 = 5 students.
      Boys = 3 x 5 = 15.

  - number: 45
    type: multiple_choice
    topic: Ratios and Rates
    difficulty: easy
    question: |
      A car travels 180 miles in 3 hours. At this rate, how many miles will it travel
      in 5 hours?
    choices:
      A: "240 miles"
      B: "280 miles"
      C: "300 miles"
      D: "360 miles"
    answer: C
    explanation: |
      Rate = 180 / 3 = 60 miles per hour.
      In 5 hours: 60 x 5 = 300 miles.

  - number: 46
    type: multiple_choice
    topic: Mixtures
    difficulty: hard
    question: |
      A chemist has a 30% acid solution and a 50% acid solution. She wants to make
